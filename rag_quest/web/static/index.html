<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG-Quest</title>
    <style>
      :root {
        --bg: #0f0f14;
        --bg-panel: #16161f;
        --bg-input: #1c1c28;
        --bg-hover: #22222f;
        --fg: #e6e6e6;
        --fg-dim: #8a8a99;
        --accent-player: #4fb8d9;
        --accent-narrator: #6bcb77;
        --accent-event: #ffd166;
        --accent-achievement: #d98cff;
        --accent-quest: #ff9f43;
        --border: #2a2a38;
        --danger: #ff6b6b;
        --hp-high: #6bcb77;
        --hp-mid: #ffd166;
        --hp-low: #ff6b6b;
        --radius: 6px;
        --transition: 0.15s ease;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: "SF Mono", "Menlo", "Consolas", ui-monospace, monospace;
        font-size: 14px;
        line-height: 1.55;
      }

      /* Accessibility: skip link */
      .skip-link {
        position: absolute;
        top: -100px;
        left: 8px;
        background: var(--accent-player);
        color: var(--bg);
        padding: 6px 12px;
        border-radius: var(--radius);
        z-index: 100;
        font-size: 12px;
        text-decoration: none;
      }

      .skip-link:focus {
        top: 8px;
      }

      /* Focus ring for keyboard nav */
      :focus-visible {
        outline: 2px solid var(--accent-player);
        outline-offset: 2px;
      }

      #app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        grid-template-columns: 1fr;
        height: 100vh;
      }

      /* ----- Header ---------------------------------------------------- */
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
        flex-wrap: wrap;
      }

      header h1 {
        font-size: 14px;
        margin: 0;
        color: var(--accent-narrator);
        letter-spacing: 0.08em;
      }

      header .spacer {
        flex: 1;
      }

      header select,
      header button {
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 6px 10px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
        border-radius: var(--radius);
        transition: border-color var(--transition), background var(--transition);
      }

      header select:hover,
      header button:hover {
        border-color: var(--accent-narrator);
        background: var(--bg-hover);
      }

      header #status {
        color: var(--fg-dim);
        font-size: 12px;
      }

      /* ----- Main layout ----------------------------------------------- */
      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        overflow: hidden;
      }

      /* ----- Narrator pane --------------------------------------------- */
      #narrator {
        overflow-y: auto;
        padding: 16px 20px;
      }

      #narrator .line {
        margin: 0 0 8px 0;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      #narrator .player {
        color: var(--accent-player);
      }

      #narrator .player::before {
        content: "\25B6 ";
        font-size: 10px;
        opacity: 0.6;
      }

      #narrator .narrator-text {
        color: var(--accent-narrator);
      }

      #narrator .system {
        color: var(--fg-dim);
        font-style: italic;
      }

      #narrator .event-banner {
        color: var(--accent-event);
        border: 1px solid var(--accent-event);
        padding: 8px 12px;
        margin: 4px 0 12px 0;
        background: rgba(255, 209, 102, 0.06);
        border-radius: var(--radius);
      }

      #narrator .achievement {
        color: var(--accent-achievement);
        margin: 4px 0 8px 0;
      }

      #narrator .error {
        color: var(--danger);
      }

      /* Loading indicator */
      #narrator .loading-indicator {
        color: var(--fg-dim);
        font-style: italic;
      }

      #narrator .loading-indicator .dot {
        display: inline-block;
        animation: pulse 1.2s infinite;
      }

      #narrator .loading-indicator .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      #narrator .loading-indicator .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.2;
        }
        40% {
          opacity: 1;
        }
      }

      /* Welcome panel */
      .welcome-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        color: var(--fg-dim);
        padding: 32px;
        gap: 16px;
      }

      .welcome-panel .title {
        color: var(--accent-narrator);
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 0.12em;
      }

      .welcome-panel .subtitle {
        max-width: 400px;
        line-height: 1.7;
      }

      /* ----- State sidebar --------------------------------------------- */
      #state {
        border-left: 1px solid var(--border);
        background: var(--bg-panel);
        overflow-y: auto;
        padding: 16px;
      }

      #state h2 {
        margin: 0 0 10px 0;
        font-size: 11px;
        color: var(--fg-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      #state .field {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }

      #state .field:last-child {
        border-bottom: none;
      }

      #state .field .key {
        color: var(--fg-dim);
      }

      #state section {
        margin-bottom: 18px;
      }

      #state ul {
        margin: 6px 0 0 0;
        padding: 0;
        list-style: none;
      }

      #state li {
        padding: 3px 0;
        color: var(--fg);
        font-size: 13px;
      }

      #state li.dim {
        color: var(--fg-dim);
        font-style: italic;
      }

      /* HP bar */
      .hp-bar-container {
        width: 100%;
        height: 8px;
        background: var(--bg-input);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 4px;
      }

      .hp-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.4s ease, background-color 0.4s ease;
      }

      /* Quest item styling */
      .quest-item {
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
      }

      .quest-item:last-child {
        border-bottom: none;
      }

      .quest-title {
        color: var(--accent-quest);
        font-size: 13px;
      }

      .quest-status {
        color: var(--fg-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ----- Footer / input -------------------------------------------- */
      footer {
        border-top: 1px solid var(--border);
        background: var(--bg-panel);
        padding: 10px 16px;
      }

      footer form {
        display: flex;
        gap: 10px;
      }

      footer input {
        flex: 1;
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 10px 12px;
        font-family: inherit;
        font-size: 14px;
        border-radius: var(--radius);
        transition: border-color var(--transition);
      }

      footer input:focus {
        outline: none;
        border-color: var(--accent-player);
      }

      footer input:disabled {
        opacity: 0.5;
      }

      footer button {
        background: var(--accent-player);
        color: var(--bg);
        border: none;
        padding: 10px 20px;
        font-family: inherit;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        border-radius: var(--radius);
        transition: opacity var(--transition), transform var(--transition);
      }

      footer button:hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      footer button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ----- Responsive: stack sidebar on narrow screens --------------- */
      @media (max-width: 768px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr auto;
        }

        #state {
          border-left: none;
          border-top: 1px solid var(--border);
          max-height: 200px;
          overflow-y: auto;
        }

        header {
          gap: 8px;
          padding: 8px 12px;
        }

        footer {
          padding: 8px 12px;
        }

        footer input {
          padding: 8px 10px;
          font-size: 13px;
        }

        footer button {
          padding: 8px 14px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#turn-input">Skip to input</a>
    <div id="app">
      <header>
        <h1>RAG-QUEST</h1>
        <select id="save-select" aria-label="Choose save slot">
          <option value="">-- choose a save --</option>
        </select>
        <button id="load-btn" type="button" aria-label="Load selected save">
          Load
        </button>
        <div class="spacer"></div>
        <span id="status" role="status" aria-live="polite">no session</span>
      </header>

      <main>
        <div id="narrator" role="log" aria-live="polite" aria-label="Narrator output"></div>
        <aside id="state" aria-label="Game state panel">
          <section>
            <h2>Character</h2>
            <div id="char-fields"></div>
            <div id="hp-bar-wrapper" style="display: none">
              <div class="hp-bar-container">
                <div id="hp-bar" class="hp-bar-fill"></div>
              </div>
            </div>
          </section>
          <section>
            <h2>Location</h2>
            <div id="loc-field" class="field"></div>
          </section>
          <section>
            <h2>Inventory</h2>
            <ul id="inv-list"></ul>
          </section>
          <section>
            <h2>Quests</h2>
            <div id="quest-list"></div>
          </section>
        </aside>
      </main>

      <footer>
        <form id="turn-form">
          <input
            id="turn-input"
            type="text"
            placeholder="What do you do?"
            autocomplete="off"
            disabled
            aria-label="Enter your action"
          />
          <button id="turn-submit" type="submit" disabled aria-label="Send action">
            Send
          </button>
        </form>
      </footer>
    </div>

    <script>
      // ----- Module-level state --------------------------------------------
      const state = {
        sessionId: null,
        currentNarratorLine: null, // live element being streamed into
        narratorBuffer: "", // accumulated text for markdown re-render
        loadingEl: null, // loading indicator element
      };

      const els = {
        saveSelect: document.getElementById("save-select"),
        loadBtn: document.getElementById("load-btn"),
        status: document.getElementById("status"),
        narrator: document.getElementById("narrator"),
        charFields: document.getElementById("char-fields"),
        hpBarWrapper: document.getElementById("hp-bar-wrapper"),
        hpBar: document.getElementById("hp-bar"),
        locField: document.getElementById("loc-field"),
        invList: document.getElementById("inv-list"),
        questList: document.getElementById("quest-list"),
        turnForm: document.getElementById("turn-form"),
        turnInput: document.getElementById("turn-input"),
        turnSubmit: document.getElementById("turn-submit"),
      };

      // ----- DOM helpers ---------------------------------------------------
      //
      // NOTE: every place we render server-supplied text uses
      // ``textContent``/``createElement``, never ``innerHTML``. The web
      // endpoints return data sourced from LLM output and user saves —
      // treating any of it as HTML would be an XSS footgun.

      function removeAllChildren(node) {
        while (node.firstChild) {
          node.removeChild(node.firstChild);
        }
      }

      function makeEl(tag, { cls, text } = {}) {
        const el = document.createElement(tag);
        if (cls) el.className = cls;
        if (text !== undefined && text !== null) el.textContent = String(text);
        return el;
      }

      function scrollNarratorToBottom() {
        els.narrator.scrollTop = els.narrator.scrollHeight;
      }

      function appendLine(text, cls) {
        const p = makeEl("p", { cls: `line ${cls}`, text });
        els.narrator.appendChild(p);
        scrollNarratorToBottom();
        return p;
      }

      // -- Safe markdown-to-DOM (no innerHTML) --------------------------------
      // Converts **bold** and *italic* markers into <strong>/<em> elements.
      // Everything is created via createElement/textContent so LLM output
      // can never inject HTML.
      const _MD_PATTERN =
        /\*\*(.+?)\*\*|__(.+?)__|(?<!\w)\*(.+?)\*(?!\w)|(?<!\w)_(.+?)_(?!\w)/g;

      function appendMarkdownText(parentEl, text) {
        _MD_PATTERN.lastIndex = 0;
        let lastIndex = 0;
        let match;
        while ((match = _MD_PATTERN.exec(text)) !== null) {
          if (match.index > lastIndex) {
            parentEl.appendChild(
              document.createTextNode(text.substring(lastIndex, match.index)),
            );
          }
          const bold = match[1] || match[2];
          const italic = match[3] || match[4];
          if (bold) {
            const el = document.createElement("strong");
            el.textContent = bold;
            parentEl.appendChild(el);
          } else if (italic) {
            const el = document.createElement("em");
            el.textContent = italic;
            parentEl.appendChild(el);
          }
          lastIndex = _MD_PATTERN.lastIndex;
        }
        if (lastIndex < text.length) {
          parentEl.appendChild(
            document.createTextNode(text.substring(lastIndex)),
          );
        }
      }

      function setStatus(text) {
        els.status.textContent = text;
      }

      function setInputEnabled(enabled) {
        els.turnInput.disabled = !enabled;
        els.turnSubmit.disabled = !enabled;
        if (enabled) {
          els.turnInput.focus();
        }
      }

      // -- Loading indicator --------------------------------------------------
      function showLoading() {
        if (state.loadingEl) return;
        const p = makeEl("p", { cls: "line loading-indicator" });
        p.appendChild(makeEl("span", { text: "Thinking" }));
        for (let i = 0; i < 3; i++) {
          p.appendChild(makeEl("span", { cls: "dot", text: "." }));
        }
        els.narrator.appendChild(p);
        state.loadingEl = p;
        scrollNarratorToBottom();
      }

      function hideLoading() {
        if (state.loadingEl && state.loadingEl.parentNode) {
          state.loadingEl.parentNode.removeChild(state.loadingEl);
        }
        state.loadingEl = null;
      }

      // -- Welcome panel ------------------------------------------------------
      function showWelcome() {
        const panel = makeEl("div", { cls: "welcome-panel" });
        panel.appendChild(makeEl("div", { cls: "title", text: "RAG-QUEST" }));
        panel.appendChild(
          makeEl("div", {
            cls: "subtitle",
            text: "AI-powered D&D text RPG with LightRAG knowledge grounding. Choose a save slot above and click Load to begin your adventure.",
          }),
        );
        els.narrator.appendChild(panel);
      }

      // ----- HP bar ----------------------------------------------------------
      function updateHpBar(current, max) {
        if (
          current === undefined ||
          current === null ||
          max === undefined ||
          max === null ||
          max <= 0
        ) {
          els.hpBarWrapper.style.display = "none";
          return;
        }
        els.hpBarWrapper.style.display = "block";
        const pct = Math.max(0, Math.min(100, (current / max) * 100));
        els.hpBar.style.width = pct + "%";
        if (pct > 60) {
          els.hpBar.style.backgroundColor = "var(--hp-high)";
        } else if (pct > 30) {
          els.hpBar.style.backgroundColor = "var(--hp-mid)";
        } else {
          els.hpBar.style.backgroundColor = "var(--hp-low)";
        }
      }

      // ----- State panel ---------------------------------------------------
      function renderStateField(parent, key, value) {
        if (value === undefined || value === null || value === "") return;
        const row = makeEl("div", { cls: "field" });
        row.appendChild(makeEl("span", { cls: "key", text: key }));
        row.appendChild(makeEl("span", { text: value }));
        parent.appendChild(row);
      }

      function renderState(stateDict) {
        if (!stateDict) return;
        const char = stateDict.character || {};

        removeAllChildren(els.charFields);
        renderStateField(els.charFields, "Name", char.name);
        renderStateField(els.charFields, "Race", char.race);
        renderStateField(
          els.charFields,
          "Class",
          char.character_class || char.class_,
        );
        renderStateField(els.charFields, "Level", char.level);
        renderStateField(
          els.charFields,
          "HP",
          `${char.current_hp ?? "?"}/${char.max_hp ?? "?"}`,
        );
        renderStateField(els.charFields, "XP", char.xp);

        // HP bar
        updateHpBar(char.current_hp, char.max_hp);

        removeAllChildren(els.locField);
        const locLabel =
          char.location || (stateDict.world && stateDict.world.name) || "--";
        els.locField.appendChild(
          makeEl("span", { cls: "key", text: locLabel }),
        );

        // Inventory
        const inv = stateDict.inventory || {};
        // Inventory.to_dict() returns {items: {name: {...}, ...}} (dict), but
        // older formats may use a list. Normalise to an array of item objects.
        let items;
        if (Array.isArray(inv.items)) {
          items = inv.items;
        } else if (inv.items && typeof inv.items === "object") {
          items = Object.values(inv.items);
        } else {
          items = [];
        }
        removeAllChildren(els.invList);
        if (items.length === 0) {
          els.invList.appendChild(makeEl("li", { cls: "dim", text: "(empty)" }));
        } else {
          for (const item of items.slice(0, 20)) {
            const label =
              typeof item === "string"
                ? item
                : item.name
                  ? `${item.name}${item.quantity > 1 ? " x" + item.quantity : ""}`
                  : JSON.stringify(item);
            els.invList.appendChild(makeEl("li", { text: label }));
          }
        }

        // Quests
        renderQuests(stateDict.quest_log);
      }

      function renderQuests(questLog) {
        removeAllChildren(els.questList);
        if (!questLog) {
          els.questList.appendChild(
            makeEl("div", { cls: "dim", text: "(no quests)" }),
          );
          return;
        }
        const quests = questLog.quests || [];
        const active = quests.filter(
          (q) =>
            q.status === "ACTIVE" ||
            q.status === "active" ||
            q.status === "PENDING" ||
            q.status === "pending",
        );
        if (active.length === 0) {
          els.questList.appendChild(
            makeEl("div", { cls: "dim", text: "(no active quests)" }),
          );
          return;
        }
        for (const q of active.slice(0, 10)) {
          const div = makeEl("div", { cls: "quest-item" });
          div.appendChild(
            makeEl("div", { cls: "quest-title", text: q.title || "Untitled" }),
          );
          if (q.description) {
            const desc = makeEl("div", {
              cls: "dim",
              text:
                q.description.length > 60
                  ? q.description.substring(0, 60) + "..."
                  : q.description,
            });
            desc.style.fontSize = "12px";
            div.appendChild(desc);
          }
          els.questList.appendChild(div);
        }
      }

      async function refreshState() {
        if (!state.sessionId) return;
        try {
          const res = await fetch(
            `/session/${encodeURIComponent(state.sessionId)}/state`,
          );
          if (!res.ok) throw new Error(`state ${res.status}`);
          renderState(await res.json());
        } catch (err) {
          appendLine(`[state refresh failed: ${err.message}]`, "error");
        }
      }

      // ----- Saves list + session load -------------------------------------
      async function loadSavesList() {
        try {
          const res = await fetch("/saves");
          if (!res.ok) throw new Error(`saves ${res.status}`);
          const saves = await res.json();
          removeAllChildren(els.saveSelect);
          els.saveSelect.appendChild(
            makeEl("option", { text: "-- choose a save --" }),
          );
          for (const s of saves) {
            const opt = makeEl("option", {
              text: `${s.character_name || "?"} -- ${
                s.world_name || s.name || s.slot_id || "?"
              }`,
            });
            opt.value = s.slot_id || s.id || s.name || "";
            els.saveSelect.appendChild(opt);
          }
        } catch (err) {
          appendLine(`[could not load saves: ${err.message}]`, "error");
        }
      }

      async function loadSession(slotId) {
        try {
          setStatus("loading...");
          removeAllChildren(els.narrator);
          const res = await fetch("/session/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ slot_id: slotId }),
          });
          if (!res.ok) {
            const body = await res.text();
            throw new Error(`${res.status}: ${body}`);
          }
          const data = await res.json();
          state.sessionId = data.session_id;
          setStatus(
            `${data.character} -- ${data.world} (turn ${data.turn_number})`,
          );
          appendLine(
            `Loaded ${data.character} in ${data.world} at turn ${data.turn_number}.`,
            "system",
          );
          await refreshState();
          setInputEnabled(true);
        } catch (err) {
          setStatus("load failed");
          appendLine(`[load failed: ${err.message}]`, "error");
        }
      }

      // ----- Turn streaming ------------------------------------------------
      function handleSseEvent(payload) {
        if (payload.type === "pre_turn") {
          hideLoading();
          if (payload.new_event && payload.new_event.name) {
            const banner = makeEl("div", {
              cls: "line event-banner",
            });
            banner.appendChild(
              document.createTextNode(
                "\u26A1 WORLD EVENT: " +
                  payload.new_event.name +
                  "\n" +
                  (payload.new_event.description || ""),
              ),
            );
            els.narrator.appendChild(banner);
          }
          for (const name of payload.expired_events || []) {
            appendLine(`Event ended: ${name}`, "system");
          }
          for (const member of payload.departed_party_members || []) {
            appendLine(
              `${member} has left the party due to low loyalty.`,
              "system",
            );
          }
          scrollNarratorToBottom();
          return;
        }
        if (payload.type === "chunk") {
          hideLoading();
          if (!state.currentNarratorLine) {
            state.currentNarratorLine = appendLine("", "narrator-text");
            state.narratorBuffer = "";
          }
          state.narratorBuffer += payload.text || "";
          // Re-render the full buffer so markdown split across chunks works.
          removeAllChildren(state.currentNarratorLine);
          appendMarkdownText(state.currentNarratorLine, state.narratorBuffer);
          scrollNarratorToBottom();
          return;
        }
        if (payload.type === "done") {
          hideLoading();
          state.currentNarratorLine = null;
          state.narratorBuffer = "";
          const post = payload.post_turn || {};
          for (const mod of post.module_transitions || []) {
            const verb = mod.status === "completed" ? "completed" : "unlocked";
            appendLine(
              `\u25B8 Module ${verb}: ${mod.title || mod.id}`,
              "system",
            );
          }
          for (const ach of post.achievements_unlocked || []) {
            appendLine(
              `${ach.icon || "\u2605"} Achievement unlocked: ${ach.name}`,
              "achievement",
            );
          }
          // Render state from the done payload first (fast path).
          if (payload.state) {
            renderState(payload.state);
            const ch = payload.state.character || {};
            const wd = payload.state.world || {};
            const tn = payload.state.turn_number;
            if (tn !== undefined) {
              setStatus(
                `${ch.name || "?"} -- ${wd.name || "?"} (turn ${tn})`,
              );
            }
          }
          // Then fetch fresh state from API to guarantee sidebar + header sync.
          refreshState().then(() => {
            if (state.sessionId) {
              fetch(
                `/session/${encodeURIComponent(state.sessionId)}/state`,
              )
                .then((r) => r.json())
                .then((s) => {
                  const ch = s.character || {};
                  const wd = s.world || {};
                  setStatus(
                    `${ch.name || "?"} -- ${wd.name || "?"} (turn ${s.turn_number ?? "?"})`,
                  );
                })
                .catch(() => {});
            }
          });
          setInputEnabled(true);
          return;
        }
      }

      function sendTurn(input) {
        if (!state.sessionId) return;
        setInputEnabled(false);
        appendLine(`${input}`, "player");
        showLoading();

        const url = `/session/${encodeURIComponent(
          state.sessionId,
        )}/turn/stream?input=${encodeURIComponent(input)}`;
        const source = new EventSource(url);

        source.onmessage = (ev) => {
          try {
            const payload = JSON.parse(ev.data);
            handleSseEvent(payload);
            if (payload.type === "done") {
              source.close();
            }
          } catch (err) {
            appendLine(`[stream parse error: ${err.message}]`, "error");
          }
        };
        source.onerror = () => {
          // EventSource fires onerror at end-of-stream too; only re-enable
          // input so the player can continue. The done event above has
          // already re-enabled input in the happy path.
          source.close();
          hideLoading();
          state.currentNarratorLine = null;
          setInputEnabled(true);
        };
      }

      // ----- Wire up -------------------------------------------------------
      els.loadBtn.addEventListener("click", () => {
        const slot = els.saveSelect.value;
        if (!slot) return;
        loadSession(slot);
      });

      els.turnForm.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const text = els.turnInput.value.trim();
        if (!text) return;
        els.turnInput.value = "";
        sendTurn(text);
      });

      loadSavesList();
      showWelcome();
    </script>
  </body>
</html>
