          cls: "step-label",
          text: "Step 2 of 3",
        });
        cardEl.appendChild(label);
        cardEl.appendChild(makeEl("h2", { text: "Create Your Character" }));

        if (onboarding.mode === "fresh") {
          cardEl.appendChild(makeEl("label", { text: "World Name" }));
          const wnInput = document.createElement("input");
          wnInput.type = "text";
          wnInput.placeholder = "e.g. The Sunken Isles";
          wnInput.value = onboarding.worldName;
          wnInput.addEventListener("input", (e) => {
            onboarding.worldName = e.target.value;
          });
          cardEl.appendChild(wnInput);

          cardEl.appendChild(makeEl("label", { text: "Setting" }));
          const wsInput = document.createElement("input");
          wsInput.type = "text";
          wsInput.placeholder = "e.g. Dark medieval fantasy";
          wsInput.value = onboarding.worldSetting;
          wsInput.addEventListener("input", (e) => {
            onboarding.worldSetting = e.target.value;
          });
          cardEl.appendChild(wsInput);

          cardEl.appendChild(makeEl("label", { text: "Tone" }));
          const wtInput = document.createElement("input");
          wtInput.type = "text";
          wtInput.placeholder = "Dark, Heroic, or Whimsical";
          wtInput.value = onboarding.worldTone;
          wtInput.addEventListener("input", (e) => {
            onboarding.worldTone = e.target.value;
          });
          cardEl.appendChild(wtInput);
        }

        cardEl.appendChild(makeEl("label", { text: "Character Name" }));
        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.id = "onboarding-name";
        nameInput.placeholder = "e.g. Kael, Lyra, Grimjaw";
        nameInput.value = onboarding.characterName;
        nameInput.addEventListener("input", (e) => {
          onboarding.characterName = e.target.value;
        });
        cardEl.appendChild(nameInput);

        cardEl.appendChild(makeEl("label", { text: "Race" }));
        const raceGrid = makeEl("div", { cls: "option-grid" });
        for (const r of onboarding.races) {
          const btn = makeEl("button", {
            cls:
              "option-btn" + (onboarding.raceId === r.id ? " selected" : ""),
          });
          btn.type = "button";
          btn.appendChild(makeEl("span", { cls: "opt-name", text: r.name }));
          btn.appendChild(
            document.createTextNode(" -- " + r.description + " "),
          );
          btn.appendChild(
            makeEl("span", { cls: "opt-detail", text: r.bonuses }),
          );
          btn.addEventListener("click", () => {
            onboarding.raceId = r.id;
            renderOnboardingStep();
          });
          raceGrid.appendChild(btn);
        }
        cardEl.appendChild(raceGrid);

        cardEl.appendChild(makeEl("label", { text: "Class" }));
        const classGrid = makeEl("div", { cls: "option-grid" });
        for (const c of onboarding.classes) {
          const btn = makeEl("button", {
            cls:
              "option-btn" + (onboarding.classId === c.id ? " selected" : ""),
          });
          btn.type = "button";
          const row1 = makeEl("div");
          row1.appendChild(makeEl("span", { cls: "opt-name", text: c.name }));
          row1.appendChild(
            document.createTextNode(
              " -- " + c.description + " (HP: " + c.hp + ")",
            ),
          );
          btn.appendChild(row1);
          btn.appendChild(
            makeEl("div", { cls: "opt-detail", text: c.abilities }),
          );
          btn.addEventListener("click", () => {
            onboarding.classId = c.id;
            renderOnboardingStep();
          });
          classGrid.appendChild(btn);
        }
        cardEl.appendChild(classGrid);

        const nav = makeEl("div", { cls: "onboarding-nav" });
        const backBtn = makeEl("button", { text: "Back" });
        backBtn.type = "button";
        backBtn.addEventListener("click", () => {
          onboarding.step = 1;
          renderOnboardingStep();
        });
        nav.appendChild(backBtn);

        const nextBtn = makeEl("button", { cls: "primary", text: "Next" });
        nextBtn.type = "button";
        nextBtn.disabled =
          !onboarding.characterName.trim() ||
          !onboarding.raceId ||
          !onboarding.classId;
        nextBtn.addEventListener("click", () => {
          onboarding.step = 3;
          renderOnboardingStep();
        });
        nav.appendChild(nextBtn);
        cardEl.appendChild(nav);

        if (!onboarding.characterName) {
          nameInput.focus();
        }
      }

      function renderStep3_Confirm() {
        const label = makeEl("div", {
          cls: "step-label",
          text: "Step 3 of 3",
        });
        cardEl.appendChild(label);
        cardEl.appendChild(makeEl("h2", { text: "Confirm Your Adventure" }));

        const tpl = onboarding.templates.find(
          (t) => t.id === onboarding.templateId,
        );
        const raceName =
          (onboarding.races.find((r) => r.id === onboarding.raceId) || {})
            .name || onboarding.raceId;
        const className =
          (onboarding.classes.find((c) => c.id === onboarding.classId) || {})
            .name || onboarding.classId;

        const preview = makeEl("div", { cls: "onboarding-preview" });
        function addRow(key, val) {
          const row = makeEl("div", { cls: "preview-row" });
          row.appendChild(makeEl("span", { cls: "preview-key", text: key }));
          row.appendChild(makeEl("span", { text: val }));
          preview.appendChild(row);
        }
        addRow(
          "World",
          tpl ? tpl.name : onboarding.worldName || "Generated World",
        );
        if (tpl) {
          addRow("Setting", tpl.setting);
          addRow("Tone", tpl.tone);
        } else {
          if (onboarding.worldSetting) addRow("Setting", onboarding.worldSetting);
          if (onboarding.worldTone) addRow("Tone", onboarding.worldTone);
        }
        addRow("Character", onboarding.characterName);
        addRow("Race", raceName);
        addRow("Class", className);
        cardEl.appendChild(preview);

        const nav = makeEl("div", { cls: "onboarding-nav" });
        const backBtn = makeEl("button", { text: "Back" });
        backBtn.type = "button";
        backBtn.addEventListener("click", () => {
          onboarding.step = 2;
          renderOnboardingStep();
        });
        nav.appendChild(backBtn);

        const createBtn = makeEl("button", {
          cls: "primary",
          text: "Start Adventure",
        });
        createBtn.type = "button";
        createBtn.addEventListener("click", () => submitNewGame(createBtn));
        nav.appendChild(createBtn);
        cardEl.appendChild(nav);
      }

      async function submitNewGame(btn) {
        btn.disabled = true;
        btn.textContent = "Creating...";
        try {
          const body = {
            character_name: onboarding.characterName.trim(),
            race: onboarding.raceId,
            character_class: onboarding.classId,
          };
          if (onboarding.mode === "template") {
            body.template_id = onboarding.templateId;
          } else {
            body.world_name = onboarding.worldName || undefined;
            body.world_setting = onboarding.worldSetting || undefined;
            body.world_tone = onboarding.worldTone || undefined;
          }
          const res = await fetch("/session/new", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const detail = await res.text();
            throw new Error(detail);
          }
          const data = await res.json();
          state.sessionId = data.session_id;
          closeOnboarding();
          removeAllChildren(els.narrator);
          setStatus(
            `${data.character} -- ${data.world} (turn ${data.turn_number})`,
          );
          appendLine(
            `Welcome, ${data.character}! Your adventure in ${data.world} begins.`,
            "system",
          );
          await refreshState();
          await loadSavesList();
          setInputEnabled(true);
        } catch (err) {
          appendLine(`[new game failed: ${err.message}]`, "error");
          closeOnboarding();
        }
      }

      document
        .getElementById("new-game-btn")
        .addEventListener("click", openOnboarding);

      loadSavesList();
      showWelcome();
    </script>
  </body>
</html>
