<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG-Quest</title>
    <style>
      :root {
        --bg: #0f0f14;
        --bg-panel: #16161f;
        --bg-input: #1c1c28;
        --bg-hover: #22222f;
        --fg: #e6e6e6;
        --fg-dim: #8a8a99;
        --accent-player: #4fb8d9;
        --accent-narrator: #6bcb77;
        --accent-event: #ffd166;
        --accent-achievement: #d98cff;
        --accent-quest: #ff9f43;
        --border: #2a2a38;
        --danger: #ff6b6b;
        --hp-high: #6bcb77;
        --hp-mid: #ffd166;
        --hp-low: #ff6b6b;
        --radius: 6px;
        --transition: 0.15s ease;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: "SF Mono", "Menlo", "Consolas", ui-monospace, monospace;
        font-size: 14px;
        line-height: 1.55;
      }

      /* Accessibility: skip link */
      .skip-link {
        position: absolute;
        top: -100px;
        left: 8px;
        background: var(--accent-player);
        color: var(--bg);
        padding: 6px 12px;
        border-radius: var(--radius);
        z-index: 100;
        font-size: 12px;
        text-decoration: none;
      }

      .skip-link:focus {
        top: 8px;
      }

      /* Focus ring for keyboard nav */
      :focus-visible {
        outline: 2px solid var(--accent-player);
        outline-offset: 2px;
      }

      #app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        grid-template-columns: 1fr;
        height: 100vh;
      }

      /* ----- Header ---------------------------------------------------- */
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
        flex-wrap: wrap;
      }

      header h1 {
        font-size: 14px;
        margin: 0;
        color: var(--accent-narrator);
        letter-spacing: 0.08em;
      }

      header .spacer {
        flex: 1;
      }

      header select,
      header button {
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 6px 10px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
        border-radius: var(--radius);
        transition: border-color var(--transition), background var(--transition);
      }

      header select:hover,
      header button:hover {
        border-color: var(--accent-narrator);
        background: var(--bg-hover);
      }

      header #status {
        color: var(--fg-dim);
        font-size: 12px;
      }

      /* ----- Main layout ----------------------------------------------- */
      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        overflow: hidden;
      }

      /* ----- Narrator pane --------------------------------------------- */
      #narrator {
        overflow-y: auto;
        padding: 16px 20px;
      }

      #narrator .line {
        margin: 0 0 8px 0;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      #narrator .player {
        color: var(--accent-player);
      }

      #narrator .player::before {
        content: "\25B6 ";
        font-size: 10px;
        opacity: 0.6;
      }

      #narrator .narrator-text {
        color: var(--accent-narrator);
      }

      #narrator .system {
        color: var(--fg-dim);
        font-style: italic;
      }

      #narrator .event-banner {
        color: var(--accent-event);
        border: 1px solid var(--accent-event);
        padding: 8px 12px;
        margin: 4px 0 12px 0;
        background: rgba(255, 209, 102, 0.06);
        border-radius: var(--radius);
      }

      #narrator .achievement {
        color: var(--accent-achievement);
        margin: 4px 0 8px 0;
      }

      #narrator .error {
        color: var(--danger);
      }

      /* Loading indicator */
      #narrator .loading-indicator {
        color: var(--fg-dim);
        font-style: italic;
      }

      #narrator .loading-indicator .dot {
        display: inline-block;
        animation: pulse 1.2s infinite;
      }

      #narrator .loading-indicator .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      #narrator .loading-indicator .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.2;
        }
        40% {
          opacity: 1;
        }
      }

      /* Welcome panel */
      .welcome-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        color: var(--fg-dim);
        padding: 32px;
        gap: 16px;
      }

      .welcome-panel .title {
        color: var(--accent-narrator);
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 0.12em;
      }

      .welcome-panel .subtitle {
        max-width: 400px;
        line-height: 1.7;
      }

      /* ----- State sidebar --------------------------------------------- */
      #state {
        border-left: 1px solid var(--border);
        background: var(--bg-panel);
        overflow-y: auto;
        padding: 16px;
      }

      #state h2 {
        margin: 0 0 10px 0;
        font-size: 11px;
        color: var(--fg-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      #state .field {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }

      #state .field:last-child {
        border-bottom: none;
      }

      #state .field .key {
        color: var(--fg-dim);
      }

      #state section {
        margin-bottom: 18px;
      }

      #state ul {
        margin: 6px 0 0 0;
        padding: 0;
        list-style: none;
      }

      #state li {
        padding: 3px 0;
        color: var(--fg);
        font-size: 13px;
      }

      #state li.dim {
        color: var(--fg-dim);
        font-style: italic;
      }

      /* HP bar */
      .hp-bar-container {
        width: 100%;
        height: 8px;
        background: var(--bg-input);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 4px;
      }

      .hp-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.4s ease, background-color 0.4s ease;
      }

      /* Quest item styling */
      .quest-item {
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
      }

      .quest-item:last-child {
        border-bottom: none;
      }

      .quest-title {
        color: var(--accent-quest);
        font-size: 13px;
      }

      .quest-status {
        color: var(--fg-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ----- Footer / input -------------------------------------------- */
      footer {
        border-top: 1px solid var(--border);
        background: var(--bg-panel);
        padding: 10px 16px;
      }

      footer form {
        display: flex;
        gap: 10px;
      }

      footer input {
        flex: 1;
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 10px 12px;
        font-family: inherit;
        font-size: 14px;
        border-radius: var(--radius);
        transition: border-color var(--transition);
      }

      footer input:focus {
        outline: none;
        border-color: var(--accent-player);
      }

      footer input:disabled {
        opacity: 0.5;
      }

      footer button {
        background: var(--accent-player);
        color: var(--bg);
        border: none;
        padding: 10px 20px;
        font-family: inherit;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        border-radius: var(--radius);
        transition: opacity var(--transition), transform var(--transition);
      }

      footer button:hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      footer button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ----- Onboarding overlay ----------------------------------------- */
      #onboarding-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 16px;
      }

      #onboarding-overlay.hidden {
        display: none;
      }

      .onboarding-card {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 28px 32px;
        max-width: 520px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
      }

      .onboarding-card h2 {
        margin: 0 0 6px 0;
        font-size: 16px;
        color: var(--accent-narrator);
        letter-spacing: 0.06em;
      }

      .onboarding-card .step-label {
        color: var(--fg-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 16px;
      }

      .onboarding-card .option-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 12px 0;
      }

      .onboarding-card .option-btn {
        display: block;
        width: 100%;
        text-align: left;
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 10px 14px;
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        border-radius: var(--radius);
        transition: border-color var(--transition), background var(--transition);
      }

      .onboarding-card .option-btn:hover,
      .onboarding-card .option-btn:focus-visible {
        border-color: var(--accent-narrator);
        background: var(--bg-hover);
      }

      .onboarding-card .option-btn.selected {
        border-color: var(--accent-narrator);
        background: rgba(107, 203, 119, 0.1);
      }

      .onboarding-card .option-btn .opt-name {
        color: var(--accent-narrator);
        font-weight: bold;
      }

      .onboarding-card .option-btn .opt-desc {
        color: var(--fg-dim);
        font-size: 12px;
      }

      .onboarding-card .option-btn .opt-detail {
        color: var(--fg-dim);
        font-size: 11px;
        margin-top: 2px;
      }

      .onboarding-card input[type="text"] {
        width: 100%;
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 10px 12px;
        font-family: inherit;
        font-size: 14px;
        border-radius: var(--radius);
        margin: 8px 0 16px 0;
      }

      .onboarding-card input[type="text"]:focus {
        outline: none;
        border-color: var(--accent-player);
      }

      .onboarding-nav {
        display: flex;
        gap: 10px;
        margin-top: 18px;
        justify-content: flex-end;
      }

      .onboarding-nav button {
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 8px 18px;
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        border-radius: var(--radius);
        transition: border-color var(--transition), background var(--transition);
      }

      .onboarding-nav button:hover {
        border-color: var(--accent-narrator);
        background: var(--bg-hover);
      }

      .onboarding-nav button.primary {
        background: var(--accent-narrator);
        color: var(--bg);
        border-color: var(--accent-narrator);
        font-weight: bold;
      }

      .onboarding-nav button.primary:hover {
        opacity: 0.9;
      }

      .onboarding-nav button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .onboarding-preview {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin: 12px 0;
        font-size: 13px;
      }

      .onboarding-preview .preview-row {
        display: flex;
        justify-content: space-between;
        padding: 3px 0;
      }

      .onboarding-preview .preview-key {
        color: var(--fg-dim);
      }

      /* ----- Responsive: stack sidebar on narrow screens --------------- */
      @media (max-width: 768px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr auto;
        }

        #state {
          border-left: none;
          border-top: 1px solid var(--border);
          max-height: 200px;
          overflow-y: auto;
        }

        header {
          gap: 8px;
          padding: 8px 12px;
        }

        footer {
          padding: 8px 12px;
        }

        footer input {
          padding: 8px 10px;
          font-size: 13px;
        }

        footer button {
          padding: 8px 14px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#turn-input">Skip to input</a>
    <div id="onboarding-overlay" class="hidden" role="dialog" aria-label="New game setup">
      <div class="onboarding-card" id="onboarding-card"></div>
    </div>
    <div id="app">
      <header>
        <h1>RAG-QUEST</h1>
        <select id="save-select" aria-label="Choose save slot">
          <option value="">-- choose a save --</option>
        </select>
        <button id="load-btn" type="button" aria-label="Load selected save">
          Load
        </button>
        <button id="new-game-btn" type="button" aria-label="Start a new game">
          New Game
        </button>
        <div class="spacer"></div>
        <span id="status" role="status" aria-live="polite">no session</span>
      </header>

      <main>
        <div id="narrator" role="log" aria-live="polite" aria-label="Narrator output"></div>
        <aside id="state" aria-label="Game state panel">
          <section>
            <h2>Character</h2>
            <div id="char-fields"></div>
            <div id="hp-bar-wrapper" style="display: none">
              <div class="hp-bar-container">
                <div id="hp-bar" class="hp-bar-fill"></div>
              </div>
            </div>
          </section>
          <section>
            <h2>Location</h2>
            <div id="loc-field" class="field"></div>
          </section>
          <section>
            <h2>Inventory</h2>
            <ul id="inv-list"></ul>
          </section>
          <section>
            <h2>Quests</h2>
            <div id="quest-list"></div>
          </section>
        </aside>
      </main>

      <footer>
        <form id="turn-form">
          <input
            id="turn-input"
            type="text"
            placeholder="What do you do?"
            autocomplete="off"
            disabled
            aria-label="Enter your action"
          />
          <button id="turn-submit" type="submit" disabled aria-label="Send action">
            Send
          </button>
        </form>
      </footer>
    </div>

    <script>
      // ----- Module-level state --------------------------------------------
      const state = {
        sessionId: null,
        currentNarratorLine: null, // live element being streamed into
        narratorBuffer: "", // accumulated text for markdown re-render
        loadingEl: null, // loading indicator element
      };

      const els = {
        saveSelect: document.getElementById("save-select"),
        loadBtn: document.getElementById("load-btn"),
        status: document.getElementById("status"),
        narrator: document.getElementById("narrator"),
        charFields: document.getElementById("char-fields"),
        hpBarWrapper: document.getElementById("hp-bar-wrapper"),
        hpBar: document.getElementById("hp-bar"),
        locField: document.getElementById("loc-field"),
        invList: document.getElementById("inv-list"),
        questList: document.getElementById("quest-list"),
        turnForm: document.getElementById("turn-form"),
        turnInput: document.getElementById("turn-input"),
        turnSubmit: document.getElementById("turn-submit"),
      };

      // ----- DOM helpers ---------------------------------------------------
      //
      // NOTE: every place we render server-supplied text uses
      // ``textContent``/``createElement``, never ``innerHTML``. The web
      // endpoints return data sourced from LLM output and user saves —
      // treating any of it as HTML would be an XSS footgun.

      function removeAllChildren(node) {
        while (node.firstChild) {
          node.removeChild(node.firstChild);
        }
      }

      function makeEl(tag, { cls, text } = {}) {
        const el = document.createElement(tag);
        if (cls) el.className = cls;
        if (text !== undefined && text !== null) el.textContent = String(text);
        return el;
      }

      function scrollNarratorToBottom() {
        els.narrator.scrollTop = els.narrator.scrollHeight;
      }

      function appendLine(text, cls) {
        const p = makeEl("p", { cls: `line ${cls}`, text });
        els.narrator.appendChild(p);
        scrollNarratorToBottom();
        return p;
      }

      // -- Safe markdown-to-DOM (no innerHTML) --------------------------------
      // Converts **bold** and *italic* markers into <strong>/<em> elements.
      // Everything is created via createElement/textContent so LLM output
      // can never inject HTML.
      const _MD_PATTERN =
        /\*\*(.+?)\*\*|__(.+?)__|(?<!\w)\*(.+?)\*(?!\w)|(?<!\w)_(.+?)_(?!\w)/g;

      function appendMarkdownText(parentEl, text) {
        _MD_PATTERN.lastIndex = 0;
        let lastIndex = 0;
        let match;
        while ((match = _MD_PATTERN.exec(text)) !== null) {
          if (match.index > lastIndex) {
            parentEl.appendChild(
              document.createTextNode(text.substring(lastIndex, match.index)),
            );
          }
          const bold = match[1] || match[2];
          const italic = match[3] || match[4];
          if (bold) {
            const el = document.createElement("strong");
            el.textContent = bold;
            parentEl.appendChild(el);
          } else if (italic) {
            const el = document.createElement("em");
            el.textContent = italic;
            parentEl.appendChild(el);
          }
          lastIndex = _MD_PATTERN.lastIndex;
        }
        if (lastIndex < text.length) {
          parentEl.appendChild(
            document.createTextNode(text.substring(lastIndex)),
          );
        }
      }

      function setStatus(text) {
        els.status.textContent = text;
      }

      function setInputEnabled(enabled) {
        els.turnInput.disabled = !enabled;
        els.turnSubmit.disabled = !enabled;
        if (enabled) {
          els.turnInput.focus();
        }
      }

      // -- Loading indicator --------------------------------------------------
      function showLoading() {
        if (state.loadingEl) return;
        const p = makeEl("p", { cls: "line loading-indicator" });
        p.appendChild(makeEl("span", { text: "Thinking" }));
        for (let i = 0; i < 3; i++) {
          p.appendChild(makeEl("span", { cls: "dot", text: "." }));
        }
        els.narrator.appendChild(p);
        state.loadingEl = p;
        scrollNarratorToBottom();
      }

      function hideLoading() {
        if (state.loadingEl && state.loadingEl.parentNode) {
          state.loadingEl.parentNode.removeChild(state.loadingEl);
        }
        state.loadingEl = null;
      }

      // -- Welcome panel ------------------------------------------------------
      function showWelcome() {
        const panel = makeEl("div", { cls: "welcome-panel" });
        panel.appendChild(makeEl("div", { cls: "title", text: "RAG-QUEST" }));
        panel.appendChild(
          makeEl("div", {
            cls: "subtitle",
            text: "AI-powered D&D text RPG with LightRAG knowledge grounding. Choose a save slot above and click Load to begin your adventure.",
          }),
        );
        els.narrator.appendChild(panel);
      }

      // ----- HP bar ----------------------------------------------------------
      function updateHpBar(current, max) {
        if (
          current === undefined ||
          current === null ||
          max === undefined ||
          max === null ||
          max <= 0
        ) {
          els.hpBarWrapper.style.display = "none";
          return;
        }
        els.hpBarWrapper.style.display = "block";
        const pct = Math.max(0, Math.min(100, (current / max) * 100));
        els.hpBar.style.width = pct + "%";
        if (pct > 60) {
          els.hpBar.style.backgroundColor = "var(--hp-high)";
        } else if (pct > 30) {
          els.hpBar.style.backgroundColor = "var(--hp-mid)";
        } else {
          els.hpBar.style.backgroundColor = "var(--hp-low)";
        }
      }

      // ----- State panel ---------------------------------------------------
      function renderStateField(parent, key, value) {
        if (value === undefined || value === null || value === "") return;
        const row = makeEl("div", { cls: "field" });
        row.appendChild(makeEl("span", { cls: "key", text: key }));
        row.appendChild(makeEl("span", { text: value }));
        parent.appendChild(row);
      }

      function renderState(stateDict) {
        if (!stateDict) return;
        const char = stateDict.character || {};

        removeAllChildren(els.charFields);
        renderStateField(els.charFields, "Name", char.name);
        renderStateField(els.charFields, "Race", char.race);
        renderStateField(
          els.charFields,
          "Class",
          char.character_class || char.class_,
        );
        renderStateField(els.charFields, "Level", char.level);
        renderStateField(
          els.charFields,
          "HP",
          `${char.current_hp ?? "?"}/${char.max_hp ?? "?"}`,
        );
        renderStateField(els.charFields, "XP", char.xp);

        // HP bar
        updateHpBar(char.current_hp, char.max_hp);

        removeAllChildren(els.locField);
        const locLabel =
          char.location || (stateDict.world && stateDict.world.name) || "--";
        els.locField.appendChild(
          makeEl("span", { cls: "key", text: locLabel }),
        );

        // Inventory
        const inv = stateDict.inventory || {};
        // Inventory.to_dict() returns {items: {name: {...}, ...}} (dict), but
        // older formats may use a list. Normalise to an array of item objects.
        let items;
        if (Array.isArray(inv.items)) {
          items = inv.items;
        } else if (inv.items && typeof inv.items === "object") {
          items = Object.values(inv.items);
        } else {
          items = [];
        }
        removeAllChildren(els.invList);
        if (items.length === 0) {
          els.invList.appendChild(makeEl("li", { cls: "dim", text: "(empty)" }));
        } else {
          for (const item of items.slice(0, 20)) {
            const label =
              typeof item === "string"
                ? item
                : item.name
                  ? `${item.name}${item.quantity > 1 ? " x" + item.quantity : ""}`
                  : JSON.stringify(item);
            els.invList.appendChild(makeEl("li", { text: label }));
          }
        }

        // Quests
        renderQuests(stateDict.quest_log);
      }

      function renderQuests(questLog) {
        removeAllChildren(els.questList);
        if (!questLog) {
          els.questList.appendChild(
            makeEl("div", { cls: "dim", text: "(no quests)" }),
          );
          return;
        }
        const quests = questLog.quests || [];
        const active = quests.filter(
          (q) =>
            q.status === "ACTIVE" ||
            q.status === "active" ||
            q.status === "PENDING" ||
            q.status === "pending",
        );
        if (active.length === 0) {
          els.questList.appendChild(
            makeEl("div", { cls: "dim", text: "(no active quests)" }),
          );
          return;
        }
        for (const q of active.slice(0, 10)) {
          const div = makeEl("div", { cls: "quest-item" });
          div.appendChild(
            makeEl("div", { cls: "quest-title", text: q.title || "Untitled" }),
          );
          if (q.description) {
            const desc = makeEl("div", {
              cls: "dim",
              text:
                q.description.length > 60
                  ? q.description.substring(0, 60) + "..."
                  : q.description,
            });
            desc.style.fontSize = "12px";
            div.appendChild(desc);
          }
          els.questList.appendChild(div);
        }
      }

      async function refreshState() {
        if (!state.sessionId) return;
        try {
          const res = await fetch(
            `/session/${encodeURIComponent(state.sessionId)}/state`,
          );
          if (!res.ok) throw new Error(`state ${res.status}`);
          renderState(await res.json());
        } catch (err) {
          appendLine(`[state refresh failed: ${err.message}]`, "error");
        }
      }

      // ----- Saves list + session load -------------------------------------
      async function loadSavesList() {
        try {
          const res = await fetch("/saves");
          if (!res.ok) throw new Error(`saves ${res.status}`);
          const saves = await res.json();
          removeAllChildren(els.saveSelect);
          els.saveSelect.appendChild(
            makeEl("option", { text: "-- choose a save --" }),
          );
          for (const s of saves) {
            const opt = makeEl("option", {
              text: `${s.character_name || "?"} -- ${
                s.world_name || s.name || s.slot_id || "?"
              }`,
            });
            opt.value = s.slot_id || s.id || s.name || "";
            els.saveSelect.appendChild(opt);
          }
        } catch (err) {
          appendLine(`[could not load saves: ${err.message}]`, "error");
        }
      }

      async function loadSession(slotId) {
        try {
          setStatus("loading...");
          removeAllChildren(els.narrator);
          const res = await fetch("/session/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ slot_id: slotId }),
          });
          if (!res.ok) {
            const body = await res.text();
            throw new Error(`${res.status}: ${body}`);
          }
          const data = await res.json();
          state.sessionId = data.session_id;
          setStatus(
            `${data.character} -- ${data.world} (turn ${data.turn_number})`,
          );
          appendLine(
            `Loaded ${data.character} in ${data.world} at turn ${data.turn_number}.`,
            "system",
          );
          await refreshState();
          setInputEnabled(true);
        } catch (err) {
          setStatus("load failed");
          appendLine(`[load failed: ${err.message}]`, "error");
        }
      }

      // ----- Turn streaming ------------------------------------------------
      function handleSseEvent(payload) {
        if (payload.type === "pre_turn") {
          hideLoading();
          if (payload.new_event && payload.new_event.name) {
            const banner = makeEl("div", {
              cls: "line event-banner",
            });
            banner.appendChild(
              document.createTextNode(
                "\u26A1 WORLD EVENT: " +
                  payload.new_event.name +
                  "\n" +
                  (payload.new_event.description || ""),
              ),
            );
            els.narrator.appendChild(banner);
          }
          for (const name of payload.expired_events || []) {
            appendLine(`Event ended: ${name}`, "system");
          }
          for (const member of payload.departed_party_members || []) {
            appendLine(
              `${member} has left the party due to low loyalty.`,
              "system",
            );
          }
          scrollNarratorToBottom();
          return;
        }
        if (payload.type === "chunk") {
          hideLoading();
          if (!state.currentNarratorLine) {
            state.currentNarratorLine = appendLine("", "narrator-text");
            state.narratorBuffer = "";
          }
          state.narratorBuffer += payload.text || "";
          // Re-render the full buffer so markdown split across chunks works.
          removeAllChildren(state.currentNarratorLine);
          appendMarkdownText(state.currentNarratorLine, state.narratorBuffer);
          scrollNarratorToBottom();
          return;
        }
        if (payload.type === "done") {
          hideLoading();
          state.currentNarratorLine = null;
          state.narratorBuffer = "";
          const post = payload.post_turn || {};
          for (const mod of post.module_transitions || []) {
            const verb = mod.status === "completed" ? "completed" : "unlocked";
            appendLine(
              `\u25B8 Module ${verb}: ${mod.title || mod.id}`,
              "system",
            );
          }
          for (const ach of post.achievements_unlocked || []) {
            appendLine(
              `${ach.icon || "\u2605"} Achievement unlocked: ${ach.name}`,
              "achievement",
            );
          }
          // Render state from the done payload first (fast path).
          if (payload.state) {
            renderState(payload.state);
            const ch = payload.state.character || {};
            const wd = payload.state.world || {};
            const tn = payload.state.turn_number;
            if (tn !== undefined) {
              setStatus(
                `${ch.name || "?"} -- ${wd.name || "?"} (turn ${tn})`,
              );
            }
          }
          // Then fetch fresh state from API to guarantee sidebar + header sync.
          refreshState().then(() => {
            if (state.sessionId) {
              fetch(
                `/session/${encodeURIComponent(state.sessionId)}/state`,
              )
                .then((r) => r.json())
                .then((s) => {
                  const ch = s.character || {};
                  const wd = s.world || {};
                  setStatus(
                    `${ch.name || "?"} -- ${wd.name || "?"} (turn ${s.turn_number ?? "?"})`,
                  );
                })
                .catch(() => {});
            }
          });
          setInputEnabled(true);
          return;
        }
      }

      function sendTurn(input) {
        if (!state.sessionId) return;
        setInputEnabled(false);
        appendLine(`${input}`, "player");
        showLoading();

        const url = `/session/${encodeURIComponent(
          state.sessionId,
        )}/turn/stream?input=${encodeURIComponent(input)}`;
        const source = new EventSource(url);

        source.onmessage = (ev) => {
          try {
            const payload = JSON.parse(ev.data);
            handleSseEvent(payload);
            if (payload.type === "done") {
              source.close();
            }
          } catch (err) {
            appendLine(`[stream parse error: ${err.message}]`, "error");
          }
        };
        source.onerror = () => {
          // EventSource fires onerror at end-of-stream too; only re-enable
          // input so the player can continue. The done event above has
          // already re-enabled input in the happy path.
          source.close();
          hideLoading();
          state.currentNarratorLine = null;
          setInputEnabled(true);
        };
      }

      // ----- Wire up -------------------------------------------------------
      els.loadBtn.addEventListener("click", () => {
        const slot = els.saveSelect.value;
        if (!slot) return;
        loadSession(slot);
      });

      els.turnForm.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const text = els.turnInput.value.trim();
        if (!text) return;
        els.turnInput.value = "";
        sendTurn(text);
      });

      // ----- Onboarding flow -----------------------------------------------
      const onboarding = {
        step: 0,
        templates: [],
        races: [],
        classes: [],
        // Selections:
        mode: null, // "template" | "fresh"
        templateId: null,
        worldName: "",
        worldSetting: "",
        worldTone: "",
        characterName: "",
        raceId: null,
        classId: null,
      };

      const overlayEl = document.getElementById("onboarding-overlay");
      const cardEl = document.getElementById("onboarding-card");

      async function fetchOnboardingData() {
        const [racesRes, classesRes, templatesRes] = await Promise.all([
          fetch("/onboarding/races"),
          fetch("/onboarding/classes"),
          fetch("/onboarding/templates"),
        ]);
        onboarding.races = await racesRes.json();
        onboarding.classes = await classesRes.json();
        onboarding.templates = await templatesRes.json();
      }

      function openOnboarding() {
        onboarding.step = 1;
        onboarding.mode = null;
        onboarding.templateId = null;
        onboarding.characterName = "";
        onboarding.raceId = null;
        onboarding.classId = null;
        fetchOnboardingData().then(() => renderOnboardingStep());
        overlayEl.classList.remove("hidden");
      }

      function closeOnboarding() {
        overlayEl.classList.add("hidden");
      }

      function renderOnboardingStep() {
        removeAllChildren(cardEl);
        if (onboarding.step === 1) renderStep1_Mode();
        else if (onboarding.step === 2) renderStep2_Character();
        else if (onboarding.step === 3) renderStep3_Confirm();
      }

      // Step 1: Choose mode (template or fresh)
      function renderStep1_Mode() {
        const label = makeEl("div", {
          cls: "step-label",
          text: "Step 1 of 3",
        });
        cardEl.appendChild(label);
        cardEl.appendChild(
          makeEl("h2", { text: "Choose Your World" }),
        );

        const grid = makeEl("div", { cls: "option-grid" });

        // Template options
        for (const tpl of onboarding.templates) {
          const btn = makeEl("button", { cls: "option-btn" });
          btn.type = "button";
          const nameEl = makeEl("div", { cls: "opt-name", text: tpl.name });
          const descEl = makeEl("div", {
            cls: "opt-desc",
            text: tpl.description,
          });
          const detEl = makeEl("div", {
            cls: "opt-detail",
            text: tpl.setting + " \u00B7 " + tpl.tone + " \u00B7 " + tpl.difficulty,
          });
          btn.appendChild(nameEl);
          btn.appendChild(descEl);
          btn.appendChild(detEl);
          btn.addEventListener("click", () => {
            onboarding.mode = "template";
            onboarding.templateId = tpl.id;
            onboarding.step = 2;
            renderOnboardingStep();
          });
          grid.appendChild(btn);
        }

        // Fresh adventure option
        const freshBtn = makeEl("button", { cls: "option-btn" });
        freshBtn.type = "button";
        freshBtn.appendChild(
          makeEl("div", { cls: "opt-name", text: "Fresh Adventure" }),
        );
        freshBtn.appendChild(
          makeEl("div", {
            cls: "opt-desc",
            text: "Describe your own world and the AI will bring it to life.",
          }),
        );
        freshBtn.addEventListener("click", () => {
          onboarding.mode = "fresh";
          onboarding.templateId = null;
          onboarding.step = 2;
          renderOnboardingStep();
        });
        grid.appendChild(freshBtn);

        cardEl.appendChild(grid);

        const nav = makeEl("div", { cls: "onboarding-nav" });
        const cancelBtn = makeEl("button", { text: "Cancel" });
        cancelBtn.type = "button";
        cancelBtn.addEventListener("click", closeOnboarding);
        nav.appendChild(cancelBtn);
        cardEl.appendChild(nav);
      }

      // Step 2: Character creation (name, race, class + optional world fields)
      function renderStep2_Character() {
        const label = makeEl("div", {
          cls: "step-label",
          text: "Step 2 of 3",
        });
        cardEl.appendChild(label);
        cardEl.appendChild(
          makeEl("h2", { text: "Create Your Character" }),
        );

        // Fresh mode: world fields
        if (onboarding.mode === "fresh") {
          cardEl.appendChild(
            makeEl("label", { text: "World Name" }),
          );
          const wnInput = document.createElement("input");
          wnInput.type = "text";
          wnInput.placeholder = "e.g. The Sunken Isles";
          wnInput.value = onboarding.worldName;
          wnInput.addEventListener("input", (e) => {
            onboarding.worldName = e.target.value;
          });
          cardEl.appendChild(wnInput);

          cardEl.appendChild(
            makeEl("label", { text: "Setting" }),
          );
          const wsInput = document.createElement("input");
          wsInput.type = "text";
          wsInput.placeholder = "e.g. Dark medieval fantasy";
          wsInput.value = onboarding.worldSetting;
          wsInput.addEventListener("input", (e) => {
            onboarding.worldSetting = e.target.value;
          });
          cardEl.appendChild(wsInput);

          cardEl.appendChild(
            makeEl("label", { text: "Tone" }),
          );
          const wtInput = document.createElement("input");
          wtInput.type = "text";
          wtInput.placeholder = "Dark, Heroic, or Whimsical";
          wtInput.value = onboarding.worldTone;
          wtInput.addEventListener("input", (e) => {
            onboarding.worldTone = e.target.value;
          });
          cardEl.appendChild(wtInput);
        }

        // Character name
        cardEl.appendChild(
          makeEl("label", { text: "Character Name" }),
        );
        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.id = "onboarding-name";
        nameInput.placeholder = "e.g. Kael, Lyra, Grimjaw";
        nameInput.value = onboarding.characterName;
        nameInput.addEventListener("input", (e) => {
          onboarding.characterName = e.target.value;
        });
        cardEl.appendChild(nameInput);

        // Race selection
        cardEl.appendChild(
          makeEl("label", { text: "Race" }),
        );
        const raceGrid = makeEl("div", { cls: "option-grid" });
        for (const r of onboarding.races) {
          const btn = makeEl("button", {
            cls:
              "option-btn" +
              (onboarding.raceId === r.id ? " selected" : ""),
          });
          btn.type = "button";
          btn.appendChild(
            makeEl("span", { cls: "opt-name", text: r.name }),
          );
          btn.appendChild(
            document.createTextNode(" -- " + r.description + " "),
          );
          btn.appendChild(
            makeEl("span", { cls: "opt-detail", text: r.bonuses }),
          );
          btn.addEventListener("click", () => {
            onboarding.raceId = r.id;
            renderOnboardingStep();
          });
          raceGrid.appendChild(btn);
        }
        cardEl.appendChild(raceGrid);

        // Class selection
        cardEl.appendChild(
          makeEl("label", { text: "Class" }),
        );
        const classGrid = makeEl("div", { cls: "option-grid" });
        for (const c of onboarding.classes) {
          const btn = makeEl("button", {
            cls:
              "option-btn" +
              (onboarding.classId === c.id ? " selected" : ""),
          });
          btn.type = "button";
          const row1 = makeEl("div");
          row1.appendChild(
            makeEl("span", { cls: "opt-name", text: c.name }),
          );
          row1.appendChild(
            document.createTextNode(
              " -- " + c.description + " (HP: " + c.hp + ")",
            ),
          );
          btn.appendChild(row1);
          btn.appendChild(
            makeEl("div", {
              cls: "opt-detail",
              text: c.abilities,
            }),
          );
          btn.addEventListener("click", () => {
            onboarding.classId = c.id;
            renderOnboardingStep();
          });
          classGrid.appendChild(btn);
        }
        cardEl.appendChild(classGrid);

        // Nav
        const nav = makeEl("div", { cls: "onboarding-nav" });
        const backBtn = makeEl("button", { text: "Back" });
        backBtn.type = "button";
        backBtn.addEventListener("click", () => {
          onboarding.step = 1;
          renderOnboardingStep();
        });
        nav.appendChild(backBtn);

        const nextBtn = makeEl("button", {
          cls: "primary",
          text: "Next",
        });
        nextBtn.type = "button";
        nextBtn.disabled =
          !onboarding.characterName.trim() ||
          !onboarding.raceId ||
          !onboarding.classId;
        nextBtn.addEventListener("click", () => {
          onboarding.step = 3;
          renderOnboardingStep();
        });
        nav.appendChild(nextBtn);
        cardEl.appendChild(nav);

        // Focus the name input if empty
        if (!onboarding.characterName) {
          nameInput.focus();
        }
      }

      // Step 3: Confirmation + create
      function renderStep3_Confirm() {
        const label = makeEl("div", {
          cls: "step-label",
          text: "Step 3 of 3",
        });
        cardEl.appendChild(label);
        cardEl.appendChild(
          makeEl("h2", { text: "Confirm Your Adventure" }),
        );

        const tpl = onboarding.templates.find(
          (t) => t.id === onboarding.templateId,
        );
        const raceName =
          (onboarding.races.find((r) => r.id === onboarding.raceId) || {})
            .name || onboarding.raceId;
        const className =
          (
            onboarding.classes.find((c) => c.id === onboarding.classId) || {}
          ).name || onboarding.classId;

        const preview = makeEl("div", { cls: "onboarding-preview" });
        function addRow(key, val) {
          const row = makeEl("div", { cls: "preview-row" });
          row.appendChild(makeEl("span", { cls: "preview-key", text: key }));
          row.appendChild(makeEl("span", { text: val }));
          preview.appendChild(row);
        }
        addRow(
          "World",
          tpl ? tpl.name : onboarding.worldName || "Generated World",
        );
        if (tpl) {
          addRow("Setting", tpl.setting);
          addRow("Tone", tpl.tone);
        } else {
          if (onboarding.worldSetting) addRow("Setting", onboarding.worldSetting);
          if (onboarding.worldTone) addRow("Tone", onboarding.worldTone);
        }
        addRow("Character", onboarding.characterName);
        addRow("Race", raceName);
        addRow("Class", className);
        cardEl.appendChild(preview);

        const nav = makeEl("div", { cls: "onboarding-nav" });
        const backBtn = makeEl("button", { text: "Back" });
        backBtn.type = "button";
        backBtn.addEventListener("click", () => {
          onboarding.step = 2;
          renderOnboardingStep();
        });
        nav.appendChild(backBtn);

        const createBtn = makeEl("button", {
          cls: "primary",
          text: "Start Adventure",
        });
        createBtn.type = "button";
        createBtn.addEventListener("click", () => submitNewGame(createBtn));
        nav.appendChild(createBtn);
        cardEl.appendChild(nav);
      }

      async function submitNewGame(btn) {
        btn.disabled = true;
        btn.textContent = "Creating...";
        try {
          const body = {
            character_name: onboarding.characterName.trim(),
            race: onboarding.raceId,
            character_class: onboarding.classId,
          };
          if (onboarding.mode === "template") {
            body.template_id = onboarding.templateId;
          } else {
            body.world_name = onboarding.worldName || undefined;
            body.world_setting = onboarding.worldSetting || undefined;
            body.world_tone = onboarding.worldTone || undefined;
          }
          const res = await fetch("/session/new", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const detail = await res.text();
            throw new Error(detail);
          }
          const data = await res.json();
          state.sessionId = data.session_id;
          closeOnboarding();
          removeAllChildren(els.narrator);
          setStatus(
            `${data.character} -- ${data.world} (turn ${data.turn_number})`,
          );
          appendLine(
            `Welcome, ${data.character}! Your adventure in ${data.world} begins.`,
            "system",
          );
          await refreshState();
          await loadSavesList();
          setInputEnabled(true);
        } catch (err) {
          appendLine(`[new game failed: ${err.message}]`, "error");
          closeOnboarding();
        }
      }

      document.getElementById("new-game-btn").addEventListener("click", openOnboarding);

      loadSavesList();
      showWelcome();
    </script>
  </body>
</html>
