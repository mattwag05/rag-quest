<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG-Quest</title>

    <!--
      v0.8.3 "Illuminated Terminal" — monospace terminal meets manuscript.
      Typography is load-bearing. IBM Plex Mono for body/UI, Cormorant
      Garamond italic for panel titles. No system font fallbacks until
      both have had a chance to swap in.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* -- Illuminated Terminal palette ---------------------------------
           Warm ink-black, parchment text, sealing-wax red-orange accent,
           gold-leaf highlight. Every existing selector routes through
           these tokens so the v0.8.1 polish stays visually coherent with
           the new command menu. */
        --ink: #0c0a08;
        --ink-deep: #070605;
        --ink-raise: #15110c;
        --vellum: #e8e0d0;
        --vellum-dim: #8a7e68;
        --vellum-faint: #4c4438;
        --wax: #c7391a;
        --ember: #f2643a;
        --gold: #d4a94a;
        --gold-dim: #8a6f29;
        --rule: #2a251f;
        --rule-soft: #1c1814;
        --shadow-ink: 0 0 40px rgba(12, 10, 8, 0.9);
        --radius-soft: 2px;

        /* HP bar semantics map onto the grimoire palette */
        --hp-high: var(--gold);
        --hp-mid: var(--ember);
        --hp-low: var(--wax);

        --font-mono: "IBM Plex Mono", "JetBrains Mono", ui-monospace, monospace;
        --font-serif: "Cormorant Garamond", "EB Garamond", Georgia, serif;

        --duration-fast: 120ms;
        --duration-med: 200ms;
        --duration-slow: 240ms;
        --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--ink);
        color: var(--vellum);
        font-family: var(--font-mono);
        font-size: 14px;
        line-height: 1.6;
        /* Subtle grain overlay for the "paper under candlelight" atmosphere.
           Radial warm glow from the upper-left, hairline grain via repeating
           linear gradients. No images — pure CSS so there's no extra HTTP. */
        background-image:
          radial-gradient(
            ellipse 900px 600px at 20% -10%,
            rgba(212, 169, 74, 0.04) 0%,
            rgba(12, 10, 8, 0) 60%
          ),
          repeating-linear-gradient(
            0deg,
            rgba(232, 224, 208, 0.012) 0px,
            rgba(232, 224, 208, 0.012) 1px,
            transparent 1px,
            transparent 3px
          );
      }

      /* Skip-link — accessibility */
      .skip-link {
        position: absolute;
        top: -100px;
        left: 8px;
        background: var(--wax);
        color: var(--vellum);
        padding: 6px 12px;
        z-index: 100;
        font-size: 12px;
        text-decoration: none;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .skip-link:focus {
        top: 8px;
      }

      :focus-visible {
        outline: 1px solid var(--gold);
        outline-offset: 2px;
      }

      #app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        grid-template-columns: 1fr;
        height: 100vh;
      }

      /* ----- Header ----------------------------------------------------- */
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 22px;
        border-bottom: 1px solid var(--rule);
        background: var(--ink-deep);
        flex-wrap: wrap;
        /* Hairline warm glow underline — the ink-wash between sections */
        box-shadow: 0 1px 0 0 rgba(212, 169, 74, 0.04);
      }

      header h1 {
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 600;
        font-size: 22px;
        margin: 0;
        color: var(--gold);
        letter-spacing: 0.02em;
        line-height: 1;
      }

      header h1::first-letter {
        color: var(--wax);
        font-size: 1.1em;
      }

      header .spacer {
        flex: 1;
      }

      header select,
      header button {
        background: var(--ink);
        color: var(--vellum);
        border: 1px solid var(--rule);
        padding: 7px 12px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 0;
        transition:
          border-color var(--duration-fast) var(--ease),
          background var(--duration-fast) var(--ease),
          color var(--duration-fast) var(--ease);
      }

      header select:hover,
      header button:hover {
        border-color: var(--wax);
        color: var(--vellum);
      }

      header #status {
        color: var(--vellum-dim);
        font-size: 11px;
        font-style: italic;
        font-family: var(--font-serif);
        letter-spacing: 0.01em;
      }

      /* ----- Main layout ------------------------------------------------ */
      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        overflow: hidden;
      }

      /* ----- Narrator pane --------------------------------------------- */
      #narrator {
        overflow-y: auto;
        padding: 24px 32px;
        max-width: 760px;
        margin: 0 auto;
        width: 100%;
      }

      #narrator .line {
        margin: 0 0 10px 0;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      #narrator .player {
        color: var(--gold);
        font-weight: 500;
      }

      #narrator .player::before {
        content: "\203A\00a0";
        color: var(--wax);
        font-weight: 600;
      }

      #narrator .narrator-text {
        color: var(--vellum);
      }

      #narrator .system {
        color: var(--vellum-dim);
        font-style: italic;
        font-family: var(--font-serif);
        font-size: 15px;
      }

      #narrator .event-banner {
        color: var(--gold);
        border-top: 1px solid var(--gold-dim);
        border-bottom: 1px solid var(--gold-dim);
        padding: 10px 14px;
        margin: 6px 0 14px 0;
        background: rgba(212, 169, 74, 0.04);
        letter-spacing: 0.02em;
      }

      #narrator .achievement {
        color: var(--gold);
        margin: 4px 0 8px 0;
        font-weight: 500;
        letter-spacing: 0.04em;
      }

      #narrator .error {
        color: var(--wax);
      }

      #narrator .loading-indicator {
        color: var(--vellum-dim);
        font-style: italic;
        font-family: var(--font-serif);
        font-size: 15px;
      }

      #narrator .loading-indicator .dot {
        display: inline-block;
        animation: pulse 1.2s infinite;
      }

      #narrator .loading-indicator .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      #narrator .loading-indicator .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.2;
        }
        40% {
          opacity: 1;
        }
      }

      /* Welcome panel */
      .welcome-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        color: var(--vellum-dim);
        padding: 32px;
        gap: 20px;
      }

      .welcome-panel .title {
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 600;
        color: var(--gold);
        font-size: 34px;
        letter-spacing: 0.02em;
        line-height: 1;
      }

      .welcome-panel .subtitle {
        max-width: 420px;
        line-height: 1.8;
        color: var(--vellum);
      }

      .welcome-panel .flourish {
        color: var(--gold-dim);
        letter-spacing: 1.2em;
        font-size: 10px;
      }

      /* ----- State sidebar --------------------------------------------- */
      #state {
        border-left: 1px solid var(--rule);
        background: var(--ink-deep);
        overflow-y: auto;
        padding: 22px 18px;
      }

      #state h2 {
        margin: 0 0 8px 0;
        font-size: 10px;
        color: var(--gold-dim);
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-weight: 600;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--rule);
      }

      #state .field {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        font-size: 13px;
      }

      #state .field .key {
        color: var(--vellum-dim);
        text-transform: lowercase;
        letter-spacing: 0.04em;
      }

      #state .field .val,
      #state .field span:not(.key) {
        color: var(--vellum);
      }

      #state section {
        margin-bottom: 22px;
      }

      #state ul {
        margin: 4px 0 0 0;
        padding: 0;
        list-style: none;
      }

      #state li {
        padding: 3px 0 3px 14px;
        color: var(--vellum);
        font-size: 13px;
        position: relative;
      }

      #state li::before {
        content: "\25B8";
        color: var(--gold);
        position: absolute;
        left: 0;
        font-size: 11px;
      }

      #state li.dim {
        color: var(--vellum-dim);
        font-style: italic;
        font-family: var(--font-serif);
        font-size: 14px;
      }

      #state li.dim::before {
        display: none;
      }

      /* HP bar */
      .hp-bar-container {
        width: 100%;
        height: 6px;
        background: var(--rule-soft);
        overflow: hidden;
        margin-top: 6px;
      }

      .hp-bar-fill {
        height: 100%;
        transition:
          width 0.4s var(--ease),
          background-color 0.4s var(--ease);
      }

      /* Quest item styling */
      .quest-item {
        padding: 7px 0;
        border-bottom: 1px solid var(--rule);
      }

      .quest-item:last-child {
        border-bottom: none;
      }

      .quest-title {
        color: var(--gold);
        font-size: 13px;
        font-weight: 500;
      }

      /* ----- Footer / input + command bar ------------------------------ */
      footer {
        border-top: 1px solid var(--rule);
        background: var(--ink-deep);
        box-shadow: 0 -1px 0 0 rgba(212, 169, 74, 0.04);
      }

      /* Command bar: the row of inked sigils */
      #command-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 0;
        padding: 10px 16px 0 16px;
        border-bottom: 1px solid var(--rule-soft);
      }

      .sigil {
        appearance: none;
        background: transparent;
        color: var(--vellum-dim);
        border: 1px solid var(--rule);
        border-right-width: 0;
        padding: 10px 14px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        cursor: pointer;
        min-height: 44px;
        min-width: 56px;
        transition:
          background-color var(--duration-fast) var(--ease),
          color var(--duration-fast) var(--ease),
          letter-spacing var(--duration-fast) var(--ease),
          transform var(--duration-fast) var(--ease);
      }

      .sigil:last-of-type {
        border-right-width: 1px;
      }

      .sigil:hover,
      .sigil:focus-visible {
        background: var(--wax);
        color: var(--vellum);
        letter-spacing: 0.16em;
        outline: none;
      }

      .sigil:active {
        background: var(--ember);
        color: var(--ink);
        transform: translateY(1px);
      }

      .sigil--wax {
        color: var(--wax);
        border-color: var(--wax);
        border-right-width: 1px;
        margin-left: 1px;
      }

      .sigil--wax:hover,
      .sigil--wax:focus-visible {
        background: var(--wax);
        color: var(--ink);
      }

      .sigil--wax:active {
        background: var(--ember);
      }

      .sigil[hidden] {
        display: none;
      }

      /* Input row */
      footer form {
        display: flex;
        gap: 12px;
        padding: 14px 16px 16px 16px;
      }

      footer input {
        flex: 1;
        background: var(--ink);
        color: var(--vellum);
        border: 1px solid var(--rule);
        padding: 12px 14px;
        font-family: var(--font-mono);
        font-size: 14px;
        transition: border-color var(--duration-fast) var(--ease);
      }

      footer input::placeholder {
        color: var(--vellum-faint);
        font-style: italic;
        font-family: var(--font-serif);
        font-size: 15px;
      }

      footer input:focus {
        outline: none;
        border-color: var(--gold);
      }

      footer input:disabled {
        opacity: 0.4;
      }

      footer form button {
        background: var(--wax);
        color: var(--vellum);
        border: none;
        padding: 12px 24px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background-color var(--duration-fast) var(--ease),
          opacity var(--duration-fast) var(--ease);
      }

      footer form button:hover:not(:disabled) {
        background: var(--ember);
      }

      footer form button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* ----- Panel modal ----------------------------------------------- */
      #panel-modal {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #panel-modal[hidden] {
        display: none;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(12, 10, 8, 0.82);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        animation: wash-in var(--duration-med) var(--ease);
      }

      .modal-body {
        position: relative;
        max-width: 680px;
        width: calc(100% - 32px);
        max-height: calc(100vh - 64px);
        overflow-y: auto;
        background: var(--ink);
        border: 1px solid var(--rule);
        box-shadow: var(--shadow-ink);
        padding: 34px 42px 38px 42px;
        animation: page-unfurl var(--duration-med) var(--ease);
      }

      @keyframes wash-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes page-unfurl {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .modal-header h2 {
        margin: 0;
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 600;
        font-size: 34px;
        line-height: 1.05;
        color: var(--vellum);
        letter-spacing: 0.01em;
        text-transform: lowercase;
      }

      .modal-header h2::first-letter {
        font-size: 1.6em;
        color: var(--gold);
        float: left;
        line-height: 0.88;
        padding-right: 6px;
        text-transform: uppercase;
      }

      .modal-close {
        appearance: none;
        background: transparent;
        color: var(--vellum-dim);
        border: none;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        padding: 4px 8px;
        transition: color var(--duration-fast) var(--ease);
        font-family: var(--font-mono);
      }

      .modal-close:hover,
      .modal-close:focus-visible {
        color: var(--wax);
        outline: none;
      }

      .modal-divider {
        display: block;
        width: 200px;
        height: 6px;
        color: var(--gold-dim);
        margin: 16px 0 22px 0;
      }

      .modal-content {
        color: var(--vellum);
      }

      .modal-content p {
        margin: 0 0 12px 0;
      }

      .modal-content p.dim {
        color: var(--vellum-dim);
        font-family: var(--font-serif);
        font-style: italic;
        font-size: 16px;
      }

      .modal-content h3 {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--gold-dim);
        text-transform: uppercase;
        letter-spacing: 0.22em;
        margin: 22px 0 10px 0;
        font-weight: 600;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--rule);
      }

      .modal-content h3:first-child {
        margin-top: 0;
      }

      .modal-content ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .modal-content li {
        padding: 5px 0 5px 18px;
        position: relative;
      }

      .modal-content li::before {
        content: "\25B8";
        position: absolute;
        left: 0;
        color: var(--gold);
      }

      .modal-content .kv {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid var(--rule);
      }

      .modal-content .kv:last-child {
        border-bottom: none;
      }

      .modal-content .kv .k {
        color: var(--vellum-dim);
        text-transform: lowercase;
        letter-spacing: 0.04em;
      }

      .modal-content .kv .v {
        color: var(--vellum);
      }

      .modal-content .kv .v.numeric {
        color: var(--gold);
      }

      .modal-content .tag {
        display: inline-block;
        padding: 1px 7px;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--wax);
        border: 1px solid var(--wax);
        margin-right: 8px;
        vertical-align: middle;
      }

      .modal-content .entry {
        padding: 12px 0;
        border-bottom: 1px solid var(--rule);
      }

      .modal-content .entry:last-child {
        border-bottom: none;
      }

      .modal-content .entry .turn-label {
        color: var(--gold-dim);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .modal-content .entry .prose {
        margin-top: 6px;
        color: var(--vellum);
      }

      .modal-content .empty {
        font-family: var(--font-serif);
        font-style: italic;
        font-size: 17px;
        color: var(--vellum-dim);
        text-align: center;
        padding: 24px 0;
      }

      .modal-content table {
        width: 100%;
        border-collapse: collapse;
      }

      .modal-content table td {
        padding: 6px 12px 6px 0;
        vertical-align: top;
        border-bottom: 1px solid var(--rule);
        font-size: 13px;
      }

      .modal-content table td:first-child {
        color: var(--wax);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
        width: 130px;
        white-space: nowrap;
      }

      .modal-content table td:last-child {
        color: var(--vellum);
      }

      /* Transient toast — for save confirmations */
      #toast {
        position: fixed;
        bottom: 88px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink-raise);
        color: var(--gold);
        border: 1px solid var(--gold-dim);
        padding: 10px 22px;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        z-index: 60;
        pointer-events: none;
        opacity: 0;
        transition: opacity var(--duration-med) var(--ease);
      }

      #toast.visible {
        opacity: 1;
      }

      #toast.error {
        color: var(--wax);
        border-color: var(--wax);
      }

      /* ----- Onboarding overlay (preserved, re-tokenized) -------------- */
      #onboarding-overlay {
        position: fixed;
        inset: 0;
        background: rgba(12, 10, 8, 0.9);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 16px;
      }

      #onboarding-overlay.hidden {
        display: none;
      }

      .onboarding-card {
        background: var(--ink);
        border: 1px solid var(--rule);
        box-shadow: var(--shadow-ink);
        padding: 34px 40px;
        max-width: 560px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
      }

      .onboarding-card h2 {
        margin: 0 0 6px 0;
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 600;
        font-size: 28px;
        color: var(--vellum);
        letter-spacing: 0.01em;
      }

      .onboarding-card h2::first-letter {
        color: var(--gold);
        font-size: 1.3em;
      }

      .onboarding-card .step-label {
        color: var(--gold-dim);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        margin-bottom: 18px;
        font-weight: 600;
      }

      .onboarding-card label {
        display: block;
        color: var(--gold-dim);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin: 18px 0 6px 0;
        font-weight: 600;
      }

      .onboarding-card .option-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 10px 0;
      }

      .onboarding-card .option-btn {
        display: block;
        width: 100%;
        text-align: left;
        background: var(--ink-deep);
        color: var(--vellum);
        border: 1px solid var(--rule);
        padding: 12px 16px;
        font-family: var(--font-mono);
        font-size: 13px;
        cursor: pointer;
        transition:
          border-color var(--duration-fast) var(--ease),
          background var(--duration-fast) var(--ease);
      }

      .onboarding-card .option-btn:hover,
      .onboarding-card .option-btn:focus-visible {
        border-color: var(--gold);
        outline: none;
      }

      .onboarding-card .option-btn.selected {
        border-color: var(--wax);
        background: rgba(199, 57, 26, 0.08);
      }

      .onboarding-card .option-btn .opt-name {
        color: var(--gold);
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .onboarding-card .option-btn .opt-desc {
        color: var(--vellum-dim);
        font-size: 12px;
      }

      .onboarding-card .option-btn .opt-detail {
        color: var(--vellum-faint);
        font-size: 11px;
        margin-top: 2px;
      }

      .onboarding-card input[type="text"] {
        width: 100%;
        background: var(--ink-deep);
        color: var(--vellum);
        border: 1px solid var(--rule);
        padding: 10px 14px;
        font-family: var(--font-mono);
        font-size: 14px;
        margin: 0;
      }

      .onboarding-card input[type="text"]:focus {
        outline: none;
        border-color: var(--gold);
      }

      .onboarding-nav {
        display: flex;
        gap: 10px;
        margin-top: 24px;
        justify-content: flex-end;
      }

      .onboarding-nav button {
        background: var(--ink-deep);
        color: var(--vellum);
        border: 1px solid var(--rule);
        padding: 10px 22px;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          border-color var(--duration-fast) var(--ease),
          background var(--duration-fast) var(--ease);
      }

      .onboarding-nav button:hover {
        border-color: var(--gold);
      }

      .onboarding-nav button.primary {
        background: var(--wax);
        color: var(--vellum);
        border-color: var(--wax);
        font-weight: 600;
      }

      .onboarding-nav button.primary:hover {
        background: var(--ember);
        border-color: var(--ember);
      }

      .onboarding-nav button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .onboarding-preview {
        background: var(--ink-deep);
        border: 1px solid var(--rule);
        padding: 14px 18px;
        margin: 14px 0;
        font-size: 13px;
      }

      .onboarding-preview .preview-row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
      }

      .onboarding-preview .preview-key {
        color: var(--vellum-dim);
      }

      /* ----- Responsive: stack sidebar on narrow screens --------------- */
      @media (max-width: 768px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr auto;
        }

        #state {
          border-left: none;
          border-top: 1px solid var(--rule);
          max-height: 180px;
          overflow-y: auto;
        }

        header {
          gap: 8px;
          padding: 10px 14px;
        }

        header h1 {
          font-size: 18px;
        }

        #narrator {
          padding: 18px 16px;
        }

        .modal-body {
          padding: 24px 20px 28px 20px;
          width: calc(100% - 16px);
          max-height: calc(100vh - 32px);
        }

        .modal-header h2 {
          font-size: 26px;
        }

        .sigil {
          padding: 9px 10px;
          font-size: 10px;
          min-width: 48px;
        }

        #command-bar {
          padding: 8px 10px 0 10px;
        }

        footer form {
          padding: 10px 10px 12px 10px;
        }

        footer input {
          padding: 10px 12px;
          font-size: 13px;
        }

        footer form button {
          padding: 10px 16px;
        }
      }

      /* Respect reduced-motion preference. All animations collapse. */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0ms !important;
          animation-delay: 0ms !important;
          transition-duration: 0ms !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#turn-input">Skip to input</a>

    <!-- Onboarding overlay (preserved from v0.8.2) -->
    <div
      id="onboarding-overlay"
      class="hidden"
      role="dialog"
      aria-label="New game setup"
    >
      <div class="onboarding-card" id="onboarding-card"></div>
    </div>

    <div id="app">
      <header>
        <h1>RAG-QUEST</h1>
        <select id="save-select" aria-label="Choose save slot">
          <option value="">-- choose a save --</option>
        </select>
        <button id="load-btn" type="button" aria-label="Load selected save">
          Load
        </button>
        <button id="new-game-btn" type="button" aria-label="Start a new game">
          New Game
        </button>
        <div class="spacer"></div>
        <span id="status" role="status" aria-live="polite">no session</span>
      </header>

      <main>
        <div
          id="narrator"
          role="log"
          aria-live="polite"
          aria-label="Narrator output"
        ></div>
        <aside id="state" aria-label="Game state panel">
          <section>
            <h2>Character</h2>
            <div id="char-fields"></div>
            <div id="hp-bar-wrapper" style="display: none">
              <div class="hp-bar-container">
                <div id="hp-bar" class="hp-bar-fill"></div>
              </div>
            </div>
          </section>
          <section>
            <h2>Location</h2>
            <div id="loc-field" class="field"></div>
          </section>
          <section>
            <h2>Inventory</h2>
            <ul id="inv-list"></ul>
          </section>
          <section>
            <h2>Quests</h2>
            <div id="quest-list"></div>
          </section>
        </aside>
      </main>

      <footer>
        <nav id="command-bar" role="toolbar" aria-label="Game commands">
          <button type="button" class="sigil" data-panel="inventory">INV</button>
          <button type="button" class="sigil" data-panel="stats">STATS</button>
          <button type="button" class="sigil" data-panel="quests">QUESTS</button>
          <button type="button" class="sigil" data-panel="party">PARTY</button>
          <button type="button" class="sigil" data-panel="relationships">NPCS</button>
          <button type="button" class="sigil" data-panel="timeline">TIME</button>
          <button type="button" class="sigil" data-panel="bookmarks">MARKS</button>
          <button type="button" class="sigil" data-panel="lore">LORE</button>
          <button type="button" class="sigil" data-panel="achievements">HONORS</button>
          <button type="button" class="sigil" data-panel="notes">NOTES</button>
          <button type="button" class="sigil" data-panel="base" data-requires="base" hidden>BASE</button>
          <button type="button" class="sigil" data-panel="modules" data-requires="modules" hidden>ARCS</button>
          <button type="button" class="sigil sigil--wax" data-action="save">SAVE</button>
          <button type="button" class="sigil sigil--wax" data-action="bookmark">MARK</button>
          <button type="button" class="sigil" data-panel="help">HELP</button>
        </nav>
        <form id="turn-form">
          <input
            id="turn-input"
            type="text"
            placeholder="What do you do?"
            autocomplete="off"
            disabled
            aria-label="Enter your action"
          />
          <button
            id="turn-submit"
            type="submit"
            disabled
            aria-label="Send action"
          >
            Send
          </button>
        </form>
      </footer>
    </div>

    <!-- Panel modal (v0.8.3) -->
    <div
      id="panel-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="panel-title"
      hidden
    >
      <div class="modal-backdrop" data-dismiss="true"></div>
      <article class="modal-body">
        <header class="modal-header">
          <h2 id="panel-title"></h2>
          <button
            type="button"
            class="modal-close"
            data-dismiss="true"
            aria-label="Close"
          >
            &times;
          </button>
        </header>
        <svg class="modal-divider" viewBox="0 0 200 6" aria-hidden="true">
          <line x1="0" y1="3" x2="92" y2="3" stroke="currentColor" stroke-width="1" />
          <path d="M100,0 L106,3 L100,6 L94,3 Z" fill="currentColor" />
          <line x1="108" y1="3" x2="200" y2="3" stroke="currentColor" stroke-width="1" />
        </svg>
        <div id="panel-content" class="modal-content"></div>
      </article>
    </div>

    <!-- Toast (save / bookmark confirmation) -->
    <div id="toast" role="status" aria-live="polite" hidden></div>

    <script>
      // ----- Module-level state --------------------------------------------
      const state = {
        sessionId: null,
        currentNarratorLine: null, // live element being streamed into
        narratorBuffer: "", // accumulated text for markdown re-render
        loadingEl: null, // loading indicator element
        latestStateDict: null, // cached most-recent game state for panels
      };

      const els = {
        saveSelect: document.getElementById("save-select"),
        loadBtn: document.getElementById("load-btn"),
        status: document.getElementById("status"),
        narrator: document.getElementById("narrator"),
        charFields: document.getElementById("char-fields"),
        hpBarWrapper: document.getElementById("hp-bar-wrapper"),
        hpBar: document.getElementById("hp-bar"),
        locField: document.getElementById("loc-field"),
        invList: document.getElementById("inv-list"),
        questList: document.getElementById("quest-list"),
        turnForm: document.getElementById("turn-form"),
        turnInput: document.getElementById("turn-input"),
        turnSubmit: document.getElementById("turn-submit"),
        commandBar: document.getElementById("command-bar"),
        panelModal: document.getElementById("panel-modal"),
        panelTitle: document.getElementById("panel-title"),
        panelContent: document.getElementById("panel-content"),
        toast: document.getElementById("toast"),
      };

      // ----- DOM helpers ---------------------------------------------------
      //
      // Every place we render server-supplied text uses textContent and
      // createElement only. LLM output and save data flow through these,
      // so the raw-HTML setter is banned on purpose (XSS footgun).

      function removeAllChildren(node) {
        while (node.firstChild) {
          node.removeChild(node.firstChild);
        }
      }

      function makeEl(tag, { cls, text } = {}) {
        const el = document.createElement(tag);
        if (cls) el.className = cls;
        if (text !== undefined && text !== null) el.textContent = String(text);
        return el;
      }

      function scrollNarratorToBottom() {
        els.narrator.scrollTop = els.narrator.scrollHeight;
      }

      function appendLine(text, cls) {
        const p = makeEl("p", { cls: `line ${cls}`, text });
        els.narrator.appendChild(p);
        scrollNarratorToBottom();
        return p;
      }

      // -- Safe markdown-to-DOM (bold + italic, no HTML injection) ---------
      // Uses String.prototype.matchAll so the regex is stateless per call.
      const _MD_PATTERN =
        /\*\*(.+?)\*\*|__(.+?)__|(?<!\w)\*(.+?)\*(?!\w)|(?<!\w)_(.+?)_(?!\w)/g;

      function appendMarkdownText(parentEl, text) {
        let lastIndex = 0;
        for (const match of text.matchAll(_MD_PATTERN)) {
          if (match.index > lastIndex) {
            parentEl.appendChild(
              document.createTextNode(text.substring(lastIndex, match.index)),
            );
          }
          const bold = match[1] || match[2];
          const italic = match[3] || match[4];
          if (bold) {
            const el = document.createElement("strong");
            el.textContent = bold;
            parentEl.appendChild(el);
          } else if (italic) {
            const el = document.createElement("em");
            el.textContent = italic;
            parentEl.appendChild(el);
          }
          lastIndex = match.index + match[0].length;
        }
        if (lastIndex < text.length) {
          parentEl.appendChild(
            document.createTextNode(text.substring(lastIndex)),
          );
        }
      }

      function setStatus(text) {
        els.status.textContent = text;
      }

      function setInputEnabled(enabled) {
        els.turnInput.disabled = !enabled;
        els.turnSubmit.disabled = !enabled;
        if (enabled) {
          els.turnInput.focus();
        }
      }

      // -- Loading indicator --------------------------------------------------
      function showLoading() {
        if (state.loadingEl) return;
        const p = makeEl("p", { cls: "line loading-indicator" });
        p.appendChild(makeEl("span", { text: "Thinking" }));
        for (let i = 0; i < 3; i++) {
          p.appendChild(makeEl("span", { cls: "dot", text: "." }));
        }
        els.narrator.appendChild(p);
        state.loadingEl = p;
        scrollNarratorToBottom();
      }

      function hideLoading() {
        if (state.loadingEl && state.loadingEl.parentNode) {
          state.loadingEl.parentNode.removeChild(state.loadingEl);
        }
        state.loadingEl = null;
      }

      // -- Welcome panel ------------------------------------------------------
      function showWelcome() {
        const panel = makeEl("div", { cls: "welcome-panel" });
        panel.appendChild(makeEl("div", { cls: "title", text: "Rag-Quest" }));
        panel.appendChild(
          makeEl("div", { cls: "flourish", text: "\u2618 \u2618 \u2618" }),
        );
        panel.appendChild(
          makeEl("div", {
            cls: "subtitle",
            text: "An adventure log scribed by a knowing dungeon master. Choose a save slot above, or start fresh — the chronicle is waiting.",
          }),
        );
        els.narrator.appendChild(panel);
      }

      // -- Toast --------------------------------------------------------------
      let _toastTimer = null;
      function showToast(message, variant) {
        els.toast.textContent = message;
        els.toast.className = variant === "error" ? "error" : "";
        els.toast.hidden = false;
        // Force reflow so the CSS transition triggers
        // eslint-disable-next-line no-unused-expressions
        els.toast.offsetWidth;
        els.toast.classList.add("visible");
        if (_toastTimer) clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => {
          els.toast.classList.remove("visible");
          setTimeout(() => {
            els.toast.hidden = true;
          }, 220);
        }, 2200);
      }

      // ----- HP bar ----------------------------------------------------------
      function updateHpBar(current, max) {
        if (
          current === undefined ||
          current === null ||
          max === undefined ||
          max === null ||
          max <= 0
        ) {
          els.hpBarWrapper.style.display = "none";
          return;
        }
        els.hpBarWrapper.style.display = "block";
        const pct = Math.max(0, Math.min(100, (current / max) * 100));
        els.hpBar.style.width = pct + "%";
        if (pct > 60) {
          els.hpBar.style.backgroundColor = "var(--hp-high)";
        } else if (pct > 30) {
          els.hpBar.style.backgroundColor = "var(--hp-mid)";
        } else {
          els.hpBar.style.backgroundColor = "var(--hp-low)";
        }
      }

      // ----- State panel ---------------------------------------------------
      function renderStateField(parent, key, value) {
        if (value === undefined || value === null || value === "") return;
        const row = makeEl("div", { cls: "field" });
        row.appendChild(makeEl("span", { cls: "key", text: key }));
        row.appendChild(makeEl("span", { text: value }));
        parent.appendChild(row);
      }

      function renderState(stateDict) {
        if (!stateDict) return;
        // Cache for client-side panels — every panel reads from here so
        // we don't round-trip to the server for navigation.
        state.latestStateDict = stateDict;
        const char = stateDict.character || {};

        removeAllChildren(els.charFields);
        renderStateField(els.charFields, "Name", char.name);
        renderStateField(els.charFields, "Race", char.race);
        renderStateField(
          els.charFields,
          "Class",
          char.character_class || char.class_,
        );
        renderStateField(els.charFields, "Level", char.level);
        renderStateField(
          els.charFields,
          "HP",
          `${char.current_hp ?? "?"}/${char.max_hp ?? "?"}`,
        );
        renderStateField(els.charFields, "XP", char.xp);

        updateHpBar(char.current_hp, char.max_hp);

        removeAllChildren(els.locField);
        const locLabel =
          char.location || (stateDict.world && stateDict.world.name) || "--";
        els.locField.appendChild(
          makeEl("span", { cls: "key", text: locLabel }),
        );

        // Inventory (sidebar preview, first 20)
        const inv = stateDict.inventory || {};
        let items;
        if (Array.isArray(inv.items)) {
          items = inv.items;
        } else if (inv.items && typeof inv.items === "object") {
          items = Object.values(inv.items);
        } else {
          items = [];
        }
        removeAllChildren(els.invList);
        if (items.length === 0) {
          els.invList.appendChild(makeEl("li", { cls: "dim", text: "(empty)" }));
        } else {
          for (const item of items.slice(0, 20)) {
            const label =
              typeof item === "string"
                ? item
                : item.name
                  ? `${item.name}${item.quantity > 1 ? " x" + item.quantity : ""}`
                  : JSON.stringify(item);
            els.invList.appendChild(makeEl("li", { text: label }));
          }
        }

        renderQuests(stateDict.quest_log);
        updateCommandBarVisibility(stateDict);
      }

      function renderQuests(questLog) {
        removeAllChildren(els.questList);
        if (!questLog) {
          els.questList.appendChild(
            makeEl("div", { cls: "dim", text: "(no quests)" }),
          );
          return;
        }
        const quests = questLog.quests || [];
        const active = quests.filter(
          (q) =>
            q.status === "ACTIVE" ||
            q.status === "active" ||
            q.status === "PENDING" ||
            q.status === "pending",
        );
        if (active.length === 0) {
          els.questList.appendChild(
            makeEl("div", { cls: "dim", text: "(no active quests)" }),
          );
          return;
        }
        for (const q of active.slice(0, 10)) {
          const div = makeEl("div", { cls: "quest-item" });
          div.appendChild(
            makeEl("div", { cls: "quest-title", text: q.title || "Untitled" }),
          );
          if (q.description) {
            const desc = makeEl("div", {
              cls: "dim",
              text:
                q.description.length > 60
                  ? q.description.substring(0, 60) + "..."
                  : q.description,
            });
            desc.style.fontSize = "12px";
            div.appendChild(desc);
          }
          els.questList.appendChild(div);
        }
      }

      async function refreshState() {
        if (!state.sessionId) return;
        try {
          const res = await fetch(
            `/session/${encodeURIComponent(state.sessionId)}/state`,
          );
          if (!res.ok) throw new Error(`state ${res.status}`);
          renderState(await res.json());
        } catch (err) {
          appendLine(`[state refresh failed: ${err.message}]`, "error");
        }
      }

      // ----- Command bar contextual visibility ----------------------------
      function updateCommandBarVisibility(stateDict) {
        if (!stateDict) return;
        const bases = (stateDict.world && stateDict.world.bases) || [];
        const modules =
          (stateDict.world &&
            stateDict.world.module_registry &&
            stateDict.world.module_registry.modules) ||
          {};
        const baseBtn = document.querySelector('[data-requires="base"]');
        const modulesBtn = document.querySelector('[data-requires="modules"]');
        if (baseBtn) baseBtn.hidden = bases.length === 0;
        if (modulesBtn) modulesBtn.hidden = Object.keys(modules).length === 0;
      }

      // ----- Saves list + session load -------------------------------------
      async function loadSavesList() {
        try {
          const res = await fetch("/saves");
          if (!res.ok) throw new Error(`saves ${res.status}`);
          const saves = await res.json();
          removeAllChildren(els.saveSelect);
          els.saveSelect.appendChild(
            makeEl("option", { text: "-- choose a save --" }),
          );
          for (const s of saves) {
            const opt = makeEl("option", {
              text: `${s.character_name || "?"} -- ${
                s.world_name || s.name || s.slot_id || "?"
              }`,
            });
            opt.value = s.slot_id || s.id || s.name || "";
            els.saveSelect.appendChild(opt);
          }
        } catch (err) {
          appendLine(`[could not load saves: ${err.message}]`, "error");
        }
      }

      async function loadSession(slotId) {
        try {
          setStatus("loading...");
          removeAllChildren(els.narrator);
          const res = await fetch("/session/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ slot_id: slotId }),
          });
          if (!res.ok) {
            const body = await res.text();
            throw new Error(`${res.status}: ${body}`);
          }
          const data = await res.json();
          state.sessionId = data.session_id;
          setStatus(
            `${data.character} -- ${data.world} (turn ${data.turn_number})`,
          );
          appendLine(
            `Loaded ${data.character} in ${data.world} at turn ${data.turn_number}.`,
            "system",
          );
          await refreshState();
          setInputEnabled(true);
        } catch (err) {
          setStatus("load failed");
          appendLine(`[load failed: ${err.message}]`, "error");
        }
      }

      // ----- Turn streaming ------------------------------------------------
      function handleSseEvent(payload) {
        if (payload.type === "pre_turn") {
          hideLoading();
          if (payload.new_event && payload.new_event.name) {
            const banner = makeEl("div", { cls: "line event-banner" });
            banner.appendChild(
              document.createTextNode(
                "\u26A1 WORLD EVENT: " +
                  payload.new_event.name +
                  "\n" +
                  (payload.new_event.description || ""),
              ),
            );
            els.narrator.appendChild(banner);
          }
          for (const name of payload.expired_events || []) {
            appendLine(`Event ended: ${name}`, "system");
          }
          for (const member of payload.departed_party_members || []) {
            appendLine(
              `${member} has left the party due to low loyalty.`,
              "system",
            );
          }
          scrollNarratorToBottom();
          return;
        }
        if (payload.type === "chunk") {
          hideLoading();
          if (!state.currentNarratorLine) {
            state.currentNarratorLine = appendLine("", "narrator-text");
            state.narratorBuffer = "";
          }
          state.narratorBuffer += payload.text || "";
          removeAllChildren(state.currentNarratorLine);
          appendMarkdownText(state.currentNarratorLine, state.narratorBuffer);
          scrollNarratorToBottom();
          return;
        }
        if (payload.type === "done") {
          hideLoading();
          state.currentNarratorLine = null;
          state.narratorBuffer = "";
          const post = payload.post_turn || {};
          for (const mod of post.module_transitions || []) {
            const verb = mod.status === "completed" ? "completed" : "unlocked";
            appendLine(
              `\u25B8 Module ${verb}: ${mod.title || mod.id}`,
              "system",
            );
          }
          for (const ach of post.achievements_unlocked || []) {
            appendLine(
              `${ach.icon || "\u2605"} Achievement unlocked: ${ach.name}`,
              "achievement",
            );
          }
          if (payload.state) {
            renderState(payload.state);
            const ch = payload.state.character || {};
            const wd = payload.state.world || {};
            const tn = payload.state.turn_number;
            if (tn !== undefined) {
              setStatus(
                `${ch.name || "?"} -- ${wd.name || "?"} (turn ${tn})`,
              );
            }
          }
          refreshState().then(() => {
            if (state.sessionId) {
              fetch(
                `/session/${encodeURIComponent(state.sessionId)}/state`,
              )
                .then((r) => r.json())
                .then((s) => {
                  const ch = s.character || {};
                  const wd = s.world || {};
                  setStatus(
                    `${ch.name || "?"} -- ${wd.name || "?"} (turn ${s.turn_number ?? "?"})`,
                  );
                })
                .catch(() => {});
            }
          });
          setInputEnabled(true);
          return;
        }
      }

      function sendTurn(input) {
        if (!state.sessionId) return;
        setInputEnabled(false);
        appendLine(`${input}`, "player");
        showLoading();

        const url = `/session/${encodeURIComponent(
          state.sessionId,
        )}/turn/stream?input=${encodeURIComponent(input)}`;
        const source = new EventSource(url);

        source.onmessage = (ev) => {
          try {
            const payload = JSON.parse(ev.data);
            handleSseEvent(payload);
            if (payload.type === "done") {
              source.close();
            }
          } catch (err) {
            appendLine(`[stream parse error: ${err.message}]`, "error");
          }
        };
        source.onerror = () => {
          source.close();
          hideLoading();
          state.currentNarratorLine = null;
          setInputEnabled(true);
        };
      }

      // ====================================================================
      // v0.8.3 — Command bar + panel modal
      // ====================================================================

      const PANEL_TITLES = {
        inventory: "inventory",
        stats: "character sheet",
        quests: "quest log",
        party: "party",
        relationships: "relationships",
        timeline: "campaign timeline",
        bookmarks: "bookmarks",
        lore: "lore encyclopedia",
        achievements: "honors earned",
        notes: "campaign notes",
        base: "base of operations",
        modules: "story arcs",
        help: "the scribe's guide",
      };

      // The help modal content is a single source of truth so future
      // commands can't drift from the guide.
      const HELP_ENTRIES = [
        ["INV", "Full inventory list with counts and descriptions."],
        ["STATS", "Character sheet: attributes, HP, XP, class abilities."],
        ["QUESTS", "Active and completed quests with objectives."],
        ["PARTY", "Companions and their loyalty."],
        ["NPCS", "People you've met and how they feel about you."],
        ["TIME", "Chronological log of everything that's happened."],
        ["MARKS", "Saved bookmarks — your favorite moments."],
        ["LORE", "Places, people, factions, and items — browse the world."],
        ["HONORS", "Achievements you have earned."],
        ["NOTES", "AI-authored campaign summaries, refreshed on save."],
        ["BASE", "Your claimed stronghold (appears once claimed)."],
        ["ARCS", "Story modules loaded into this world."],
        ["SAVE", "Manually save the current adventure."],
        ["MARK", "Bookmark the last scene for later — optional note."],
        ["HELP", "This guide."],
      ];

      const panelRenderers = {
        inventory: renderInventoryPanel,
        stats: renderStatsPanel,
        quests: renderQuestsPanel,
        party: renderPartyPanel,
        relationships: renderRelationshipsPanel,
        timeline: renderTimelinePanel,
        bookmarks: renderBookmarksPanel,
        lore: renderLorePanel,
        achievements: renderAchievementsPanel,
        modules: renderModulesPanel,
        base: renderBasePanel,
        notes: renderNotesPanel,
        help: renderHelpPanel,
      };

      function openPanel(name) {
        const renderer = panelRenderers[name];
        if (!renderer) return;
        els.panelTitle.textContent = PANEL_TITLES[name] || name;
        removeAllChildren(els.panelContent);
        try {
          const result = renderer(state.latestStateDict);
          // Async renderer (notes) returns a promise; that's fine — it
          // populates the panel content itself.
          if (result && typeof result.then === "function") {
            result.catch((err) => {
              removeAllChildren(els.panelContent);
              const p = makeEl("p", {
                cls: "dim",
                text: `Could not load: ${err.message}`,
              });
              els.panelContent.appendChild(p);
            });
          }
        } catch (err) {
          const p = makeEl("p", {
            cls: "dim",
            text: `Panel error: ${err.message}`,
          });
          els.panelContent.appendChild(p);
        }
        els.panelModal.hidden = false;
        // Focus the close button so Esc/Tab works cleanly
        const closeBtn = els.panelModal.querySelector(".modal-close");
        if (closeBtn) closeBtn.focus();
      }

      function closePanel() {
        els.panelModal.hidden = true;
        els.turnInput.focus();
      }

      // ----- Helpers used by multiple renderers ---------------------------

      function emptyEl(text) {
        return makeEl("p", { cls: "empty", text });
      }

      function kvRow(parent, key, value, opts) {
        if (value === undefined || value === null || value === "") return;
        const numeric = opts && opts.numeric;
        const row = makeEl("div", { cls: "kv" });
        row.appendChild(makeEl("span", { cls: "k", text: key }));
        row.appendChild(
          makeEl("span", {
            cls: numeric ? "v numeric" : "v",
            text: String(value),
          }),
        );
        parent.appendChild(row);
      }

      function section(parent, title) {
        parent.appendChild(makeEl("h3", { text: title }));
      }

      function bulletList(parent, items, opts) {
        const empty = (opts && opts.empty) || "(none)";
        if (!items || items.length === 0) {
          parent.appendChild(emptyEl(empty));
          return;
        }
        const ul = makeEl("ul");
        for (const item of items) {
          ul.appendChild(makeEl("li", { text: item }));
        }
        parent.appendChild(ul);
      }

      function formatItem(item) {
        if (typeof item === "string") return item;
        if (!item) return "";
        const qty = item.quantity && item.quantity > 1 ? ` x${item.quantity}` : "";
        return `${item.name || "unknown"}${qty}`;
      }

      function normalizeItems(itemsField) {
        if (!itemsField) return [];
        if (Array.isArray(itemsField)) return itemsField;
        if (typeof itemsField === "object") return Object.values(itemsField);
        return [];
      }

      // ----- Panel renderers ----------------------------------------------

      function renderInventoryPanel(stateDict) {
        const root = els.panelContent;
        const inv = (stateDict && stateDict.inventory) || {};
        const items = normalizeItems(inv.items);

        if (items.length === 0) {
          root.appendChild(emptyEl("No items. Your pack is light."));
          return;
        }

        section(root, `Carried (${items.length})`);
        const ul = makeEl("ul");
        for (const item of items) {
          const li = makeEl("li");
          const name = document.createElement("span");
          name.textContent = item.name || "unknown";
          li.appendChild(name);
          if (item.quantity && item.quantity > 1) {
            li.appendChild(
              makeEl("span", {
                cls: "v numeric",
                text: ` x${item.quantity}`,
              }),
            );
          }
          if (item.description) {
            const desc = makeEl("div", {
              cls: "dim",
              text: item.description,
            });
            desc.style.fontSize = "12px";
            desc.style.marginTop = "2px";
            li.appendChild(desc);
          }
          ul.appendChild(li);
        }
        root.appendChild(ul);
      }

      function renderStatsPanel(stateDict) {
        const root = els.panelContent;
        const char = (stateDict && stateDict.character) || {};

        section(root, "Identity");
        kvRow(root, "name", char.name);
        kvRow(root, "race", char.race);
        kvRow(root, "class", char.character_class || char.class_);
        kvRow(root, "level", char.level, { numeric: true });
        kvRow(root, "xp", char.xp, { numeric: true });

        section(root, "Vitals");
        kvRow(
          root,
          "hp",
          `${char.current_hp ?? "?"} / ${char.max_hp ?? "?"}`,
          { numeric: true },
        );
        if (char.location) kvRow(root, "location", char.location);

        const attrs = char.attributes || char.stats || null;
        if (attrs && typeof attrs === "object") {
          section(root, "Attributes");
          for (const [k, v] of Object.entries(attrs)) {
            kvRow(root, k, v, { numeric: true });
          }
        }

        const abilities = char.abilities || char.class_abilities || null;
        if (abilities && Array.isArray(abilities) && abilities.length) {
          section(root, "Abilities");
          bulletList(
            root,
            abilities.map((a) => (typeof a === "string" ? a : a.name || "")),
          );
        }
      }

      function renderQuestsPanel(stateDict) {
        const root = els.panelContent;
        const quests = ((stateDict && stateDict.quest_log) || {}).quests || [];

        if (quests.length === 0) {
          root.appendChild(emptyEl("No quests yet. Stories are waiting to begin."));
          return;
        }

        const buckets = { active: [], pending: [], completed: [], failed: [] };
        for (const q of quests) {
          const s = (q.status || "").toString().toLowerCase();
          if (buckets[s]) buckets[s].push(q);
          else buckets.active.push(q);
        }

        function renderBucket(heading, list) {
          if (list.length === 0) return;
          section(root, `${heading} (${list.length})`);
          for (const q of list) {
            const entry = makeEl("div", { cls: "entry" });
            const title = makeEl("div", { text: q.title || "Untitled Quest" });
            title.style.color = "var(--gold)";
            title.style.fontWeight = "500";
            entry.appendChild(title);
            if (q.description) {
              entry.appendChild(
                makeEl("div", { cls: "prose", text: q.description }),
              );
            }
            if (Array.isArray(q.objectives) && q.objectives.length) {
              const ul = makeEl("ul");
              for (const obj of q.objectives) {
                const text =
                  typeof obj === "string"
                    ? obj
                    : obj.text || obj.description || "objective";
                const done =
                  typeof obj === "object" && (obj.completed || obj.done);
                const li = makeEl("li", {
                  text: done ? `${text} [done]` : text,
                });
                if (done) li.style.color = "var(--vellum-dim)";
                ul.appendChild(li);
              }
              entry.appendChild(ul);
            }
            root.appendChild(entry);
          }
        }

        renderBucket("Active", buckets.active);
        renderBucket("Pending", buckets.pending);
        renderBucket("Completed", buckets.completed);
        renderBucket("Failed", buckets.failed);
      }

      function renderPartyPanel(stateDict) {
        const root = els.panelContent;
        const party = (stateDict && stateDict.party) || {};
        const members = party.members || [];

        if (!members.length) {
          root.appendChild(emptyEl("You travel alone."));
          return;
        }

        section(root, `Companions (${members.length})`);
        for (const m of members) {
          const entry = makeEl("div", { cls: "entry" });
          const name = makeEl("div", { text: m.name || "Unknown" });
          name.style.color = "var(--gold)";
          name.style.fontWeight = "500";
          entry.appendChild(name);
          const meta = [];
          if (m.role) meta.push(m.role);
          if (m.level) meta.push(`lvl ${m.level}`);
          if (m.hp !== undefined) meta.push(`hp ${m.hp}`);
          if (m.loyalty !== undefined) meta.push(`loyalty ${m.loyalty}`);
          if (meta.length) {
            entry.appendChild(
              makeEl("div", { cls: "prose dim", text: meta.join(" · ") }),
            );
          }
          root.appendChild(entry);
        }
      }

      function renderRelationshipsPanel(stateDict) {
        const root = els.panelContent;
        const rel = (stateDict && stateDict.relationships) || {};
        const npcs = rel.relationships || rel.npcs || {};
        const factions = rel.factions || {};

        const npcList = Object.values(npcs);
        const factionList = Object.values(factions);

        if (!npcList.length && !factionList.length) {
          root.appendChild(
            emptyEl("No one remembers you yet. Meet some NPCs."),
          );
          return;
        }

        if (npcList.length) {
          section(root, `People (${npcList.length})`);
          for (const npc of npcList) {
            const dispo = npc.disposition;
            const label =
              dispo === undefined
                ? ""
                : dispo >= 0.5
                  ? "ally"
                  : dispo >= 0
                    ? "friendly"
                    : dispo >= -0.5
                      ? "wary"
                      : "hostile";
            const entry = makeEl("div", { cls: "kv" });
            const left = makeEl("span", { cls: "k" });
            left.textContent = npc.name || "unknown";
            entry.appendChild(left);
            const right = makeEl("span", { cls: "v" });
            if (label) {
              const tag = makeEl("span", { cls: "tag", text: label });
              right.appendChild(tag);
            }
            if (typeof dispo === "number") {
              const num = makeEl("span", { text: dispo.toFixed(2) });
              num.style.color = "var(--gold)";
              right.appendChild(num);
            }
            entry.appendChild(right);
            root.appendChild(entry);
          }
        }

        if (factionList.length) {
          section(root, `Factions (${factionList.length})`);
          for (const f of factionList) {
            kvRow(root, f.name || "unknown", f.reputation ?? 0, {
              numeric: true,
            });
          }
        }
      }

      function renderTimelinePanel(stateDict) {
        const root = els.panelContent;
        const events = ((stateDict && stateDict.timeline) || {}).events || [];

        if (!events.length) {
          root.appendChild(
            emptyEl("The chronicle is empty — write something into it."),
          );
          return;
        }

        section(root, `Last ${Math.min(events.length, 40)} events`);
        const latest = events.slice(-40);
        for (const ev of latest) {
          const entry = makeEl("div", { cls: "entry" });
          const header = makeEl("div");
          header.appendChild(
            makeEl("span", { cls: "tag", text: ev.type || "event" }),
          );
          const turnLabel = makeEl("span", {
            cls: "turn-label",
            text: `Turn ${ev.turn ?? "?"}`,
          });
          header.appendChild(turnLabel);
          entry.appendChild(header);
          if (ev.summary) {
            entry.appendChild(
              makeEl("div", { cls: "prose", text: ev.summary }),
            );
          }
          root.appendChild(entry);
        }
      }

      function renderBookmarksPanel(stateDict) {
        const root = els.panelContent;
        const bookmarks =
          ((stateDict && stateDict.timeline) || {}).bookmarks || [];

        if (!bookmarks.length) {
          root.appendChild(
            emptyEl("No bookmarks yet — make some history first."),
          );
          return;
        }

        section(root, `Saved moments (${bookmarks.length})`);
        for (const bm of bookmarks.slice().reverse()) {
          const entry = makeEl("div", { cls: "entry" });
          const header = makeEl("div", {
            cls: "turn-label",
            text: `Turn ${bm.turn} · ${bm.location || "unknown"}${
              bm.note ? ` · ${bm.note}` : ""
            }`,
          });
          entry.appendChild(header);
          if (bm.narrator_prose) {
            const prose = makeEl("div", { cls: "prose" });
            appendMarkdownText(prose, bm.narrator_prose);
            entry.appendChild(prose);
          }
          root.appendChild(entry);
        }
      }

      function renderLorePanel(stateDict) {
        const root = els.panelContent;
        const world = (stateDict && stateDict.world) || {};
        const rel = (stateDict && stateDict.relationships) || {};
        const inv = (stateDict && stateDict.inventory) || {};

        const locations = world.visited_locations || [];
        const npcsMet = world.npcs_met || Object.keys(rel.relationships || {});
        const factions = Object.keys(rel.factions || {});
        const items = normalizeItems(inv.items).map((i) =>
          typeof i === "string" ? i : i.name || "unknown",
        );

        const any =
          locations.length + npcsMet.length + factions.length + items.length;
        if (!any) {
          root.appendChild(
            emptyEl("The world is unwritten. Explore to fill these pages."),
          );
          return;
        }

        if (locations.length) {
          section(root, `Places (${locations.length})`);
          bulletList(root, locations);
        }
        if (npcsMet.length) {
          section(root, `People (${npcsMet.length})`);
          bulletList(root, npcsMet);
        }
        if (factions.length) {
          section(root, `Factions (${factions.length})`);
          bulletList(root, factions);
        }
        if (items.length) {
          section(root, `Items (${items.length})`);
          bulletList(root, items);
        }
      }

      function renderAchievementsPanel(stateDict) {
        const root = els.panelContent;
        const ach = (stateDict && stateDict.achievements) || {};
        const all = ach.achievements || ach.all || [];
        const unlocked = Array.isArray(all)
          ? all.filter((a) => a.unlocked || a.earned)
          : Object.values(all).filter((a) => a.unlocked || a.earned);

        if (!unlocked.length) {
          root.appendChild(
            emptyEl("No honors earned yet. Win a battle. Finish a quest."),
          );
          return;
        }

        section(root, `Honors (${unlocked.length})`);
        for (const a of unlocked) {
          const entry = makeEl("div", { cls: "entry" });
          const title = makeEl("div", { text: a.name || a.id || "Unknown" });
          title.style.color = "var(--gold)";
          title.style.fontWeight = "500";
          entry.appendChild(title);
          if (a.description) {
            entry.appendChild(
              makeEl("div", { cls: "prose dim", text: a.description }),
            );
          }
          root.appendChild(entry);
        }
      }

      function renderModulesPanel(stateDict) {
        const root = els.panelContent;
        const reg =
          ((stateDict && stateDict.world) || {}).module_registry || {};
        const modules = reg.modules || {};
        const entries = Object.values(modules);

        if (!entries.length) {
          root.appendChild(emptyEl("No story arcs loaded in this world."));
          return;
        }

        section(root, `Arcs (${entries.length})`);
        for (const m of entries) {
          const entry = makeEl("div", { cls: "entry" });
          const header = makeEl("div");
          header.appendChild(
            makeEl("span", { cls: "tag", text: m.status || "locked" }),
          );
          const title = makeEl("span", {
            text: m.title || m.id || "Untitled",
          });
          title.style.color = "var(--gold)";
          title.style.fontWeight = "500";
          header.appendChild(title);
          entry.appendChild(header);
          if (m.description) {
            entry.appendChild(
              makeEl("div", { cls: "prose", text: m.description }),
            );
          }
          root.appendChild(entry);
        }
      }

      function renderBasePanel(stateDict) {
        const root = els.panelContent;
        const bases = ((stateDict && stateDict.world) || {}).bases || [];

        if (!bases.length) {
          root.appendChild(
            emptyEl("No base claimed yet. Find a stronghold worth keeping."),
          );
          return;
        }

        for (const base of bases) {
          section(root, base.name || "unnamed base");
          if (base.location_ref) kvRow(root, "location", base.location_ref);

          const storageItems = normalizeItems(
            (base.storage || {}).items || base.storage,
          );
          if (storageItems.length) {
            root.appendChild(makeEl("h3", { text: "Stored" }));
            const ul = makeEl("ul");
            for (const item of storageItems) {
              ul.appendChild(makeEl("li", { text: formatItem(item) }));
            }
            root.appendChild(ul);
          }

          const npcs = base.stationed_npcs || [];
          if (npcs.length) {
            root.appendChild(makeEl("h3", { text: "Stationed" }));
            const svc = base.npc_service || {};
            const ul = makeEl("ul");
            for (const npc of npcs) {
              const role = svc[npc];
              ul.appendChild(
                makeEl("li", { text: role ? `${npc} — ${role}` : npc }),
              );
            }
            root.appendChild(ul);
          }

          const services = base.services || [];
          if (services.length) {
            root.appendChild(makeEl("h3", { text: "Services" }));
            bulletList(root, services);
          }
        }
      }

      async function renderNotesPanel() {
        const root = els.panelContent;
        if (!state.sessionId) {
          root.appendChild(emptyEl("No session loaded."));
          return;
        }

        const loading = makeEl("p", {
          cls: "dim",
          text: "Fetching the scribe's notes...",
        });
        root.appendChild(loading);

        const res = await fetch(
          `/session/${encodeURIComponent(state.sessionId)}/notes`,
        );
        if (!res.ok) throw new Error(`notes ${res.status}`);
        const data = await res.json();
        removeAllChildren(root);

        const entries = data.entries || [];
        if (!entries.length) {
          root.appendChild(
            emptyEl("No campaign notes yet — save your game to refresh them."),
          );
          return;
        }

        section(root, `Entries (${entries.length})`);
        for (const e of entries.slice().reverse()) {
          const entry = makeEl("div", { cls: "entry" });
          const header = makeEl("div", {
            cls: "turn-label",
            text: `Turns ${e.turn_range || "?"} ${
              e.canonized ? "[canonized]" : ""
            }`.trim(),
          });
          entry.appendChild(header);
          if (e.session_summary) {
            entry.appendChild(
              makeEl("div", { cls: "prose", text: e.session_summary }),
            );
          }
          if ((e.npc_notes || []).length) {
            entry.appendChild(makeEl("h3", { text: "NPCs" }));
            bulletList(entry, e.npc_notes);
          }
          if ((e.open_hooks || []).length) {
            entry.appendChild(makeEl("h3", { text: "Open hooks" }));
            bulletList(entry, e.open_hooks);
          }
          if ((e.faction_shifts || []).length) {
            entry.appendChild(makeEl("h3", { text: "Factions" }));
            bulletList(entry, e.faction_shifts);
          }
          root.appendChild(entry);
        }
      }

      function renderHelpPanel() {
        const root = els.panelContent;
        root.appendChild(
          makeEl("p", {
            cls: "dim",
            text: "Tap a sigil below to view game state. The input box still accepts plain-English actions and slash commands.",
          }),
        );
        const table = document.createElement("table");
        for (const [cmd, desc] of HELP_ENTRIES) {
          const tr = document.createElement("tr");
          const tdCmd = document.createElement("td");
          tdCmd.textContent = cmd;
          const tdDesc = document.createElement("td");
          tdDesc.textContent = desc;
          tr.appendChild(tdCmd);
          tr.appendChild(tdDesc);
          table.appendChild(tr);
        }
        root.appendChild(table);
      }

      // ----- Mutating actions: save + bookmark ---------------------------

      async function doSave() {
        if (!state.sessionId) {
          showToast("No session loaded", "error");
          return;
        }
        try {
          const res = await fetch(
            `/session/${encodeURIComponent(state.sessionId)}/save`,
            { method: "POST" },
          );
          if (!res.ok) {
            const detail = await res.text();
            throw new Error(detail || `save ${res.status}`);
          }
          const data = await res.json();
          showToast(`Saved · turn ${data.turn}`);
        } catch (err) {
          showToast(`Save failed: ${err.message}`, "error");
        }
      }

      async function doBookmark() {
        if (!state.sessionId) {
          showToast("No session loaded", "error");
          return;
        }
        const note = window.prompt("Mark this moment — optional note:", "");
        if (note === null) return; // user cancelled
        try {
          const res = await fetch(
            `/session/${encodeURIComponent(state.sessionId)}/bookmark`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ note }),
            },
          );
          if (!res.ok) {
            const detail = await res.text();
            throw new Error(detail || `bookmark ${res.status}`);
          }
          const data = await res.json();
          showToast(`Marked turn ${data.bookmark.turn}`);
        } catch (err) {
          showToast(`Bookmark failed: ${err.message}`, "error");
        }
      }

      // ----- Command bar dispatch ----------------------------------------

      els.commandBar.addEventListener("click", (e) => {
        const btn = e.target.closest(
          'button[data-panel], button[data-action]',
        );
        if (!btn) return;
        if (btn.dataset.panel) {
          openPanel(btn.dataset.panel);
          return;
        }
        if (btn.dataset.action === "save") {
          doSave();
        } else if (btn.dataset.action === "bookmark") {
          doBookmark();
        }
      });

      // ----- Modal lifecycle ---------------------------------------------

      els.panelModal.addEventListener("click", (e) => {
        if (e.target.dataset && e.target.dataset.dismiss) {
          closePanel();
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !els.panelModal.hidden) {
          closePanel();
        }
      });

      // ----- Main wire up ------------------------------------------------
      els.loadBtn.addEventListener("click", () => {
        const slot = els.saveSelect.value;
        if (!slot) return;
        loadSession(slot);
      });

      els.turnForm.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const text = els.turnInput.value.trim();
        if (!text) return;
        els.turnInput.value = "";
        sendTurn(text);
      });

      // ====================================================================
      // Onboarding flow (preserved from v0.8.2, re-tokenized colors only)
      // ====================================================================

      const onboarding = {
        step: 0,
        templates: [],
        races: [],
        classes: [],
        mode: null,
        templateId: null,
        worldName: "",
        worldSetting: "",
        worldTone: "",
        characterName: "",
        raceId: null,
        classId: null,
      };

      const overlayEl = document.getElementById("onboarding-overlay");
      const cardEl = document.getElementById("onboarding-card");

      async function fetchOnboardingData() {
        const [racesRes, classesRes, templatesRes] = await Promise.all([
          fetch("/onboarding/races"),
          fetch("/onboarding/classes"),
          fetch("/onboarding/templates"),
        ]);
        onboarding.races = await racesRes.json();
        onboarding.classes = await classesRes.json();
        onboarding.templates = await templatesRes.json();
      }

      function openOnboarding() {
        onboarding.step = 1;
        onboarding.mode = null;
        onboarding.templateId = null;
        onboarding.characterName = "";
        onboarding.raceId = null;
        onboarding.classId = null;
        fetchOnboardingData().then(() => renderOnboardingStep());
        overlayEl.classList.remove("hidden");
      }

      function closeOnboarding() {
        overlayEl.classList.add("hidden");
      }

      function renderOnboardingStep() {
        removeAllChildren(cardEl);
        if (onboarding.step === 1) renderStep1_Mode();
        else if (onboarding.step === 2) renderStep2_Character();
        else if (onboarding.step === 3) renderStep3_Confirm();
      }

      function renderStep1_Mode() {
        const label = makeEl("div", {
          cls: "step-label",
          text: "Step 1 of 3",
        });
        cardEl.appendChild(label);
        cardEl.appendChild(makeEl("h2", { text: "Choose Your World" }));

        const grid = makeEl("div", { cls: "option-grid" });

        for (const tpl of onboarding.templates) {
          const btn = makeEl("button", { cls: "option-btn" });
          btn.type = "button";
          btn.appendChild(makeEl("div", { cls: "opt-name", text: tpl.name }));
          btn.appendChild(
            makeEl("div", { cls: "opt-desc", text: tpl.description }),
          );
          btn.appendChild(
            makeEl("div", {
              cls: "opt-detail",
              text:
                tpl.setting + " \u00B7 " + tpl.tone + " \u00B7 " + tpl.difficulty,
            }),
          );
          btn.addEventListener("click", () => {
            onboarding.mode = "template";
            onboarding.templateId = tpl.id;
            onboarding.step = 2;
            renderOnboardingStep();
          });
          grid.appendChild(btn);
        }

        const freshBtn = makeEl("button", { cls: "option-btn" });
        freshBtn.type = "button";
        freshBtn.appendChild(
          makeEl("div", { cls: "opt-name", text: "Fresh Adventure" }),
        );
        freshBtn.appendChild(
          makeEl("div", {
            cls: "opt-desc",
            text: "Describe your own world and the AI will bring it to life.",
          }),
        );
        freshBtn.addEventListener("click", () => {
          onboarding.mode = "fresh";
          onboarding.templateId = null;
          onboarding.step = 2;
          renderOnboardingStep();
        });
        grid.appendChild(freshBtn);

        cardEl.appendChild(grid);

        const nav = makeEl("div", { cls: "onboarding-nav" });
        const cancelBtn = makeEl("button", { text: "Cancel" });
        cancelBtn.type = "button";
        cancelBtn.addEventListener("click", closeOnboarding);
        nav.appendChild(cancelBtn);
        cardEl.appendChild(nav);
      }

      function renderStep2_Character() {
        const label = makeEl("div", {
